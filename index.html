      if (key === "zValue") return rawTarget(zValueForStores(stores, [item]), 1);
      return wan2(sumMetric(stores, [item], key));
    }

    function categoryStoreDisplay(store, monthWeights, key) {
      if (key === "grossMarginRate") {
        const target = sumMetric([store], monthWeights, "targetRevenue");
        const variable = sumMetric([store], monthWeights, "variableCost");
        return target ? `${(((target - variable) / target) * 100).toFixed(1)}%` : "-";
      }
      if (key === "zValue") return rawTarget(zValueForStore(store, monthWeights), 1);
      return wan2(sumMetric([store], monthWeights, key));
    }

    function buildRanking(stores, monthWeights, key) {
      return stores
        .filter(store => monthWeights.some(item => weightedMonthlyValue(store.feishuTarget, item, "targetRevenue") > 0))
        .map(store => ({
          name: store.name,
          value: monthWeights.reduce((sum, item) => sum + weightedMonthlyValue(store.feishuTarget, item, key), 0)
        }))
        .sort((a, b) => b.value - a.value)
        .slice(0, 8);
    }

    function buildCoefficientMonth(year, month, brandId = "ertong", store = null) {
      const monthNumber = Number(month);
      const days = new Date(Number(year), monthNumber, 0).getDate();
      const labels = coefficientLabels(year, monthNumber, days, brandId, store);
      const firstWeekday = new Date(Number(year), monthNumber - 1, 1).getDay() || 7;
      const cells = [];
      for (let i = 1; i < firstWeekday; i += 1) cells.push(null);
      for (let day = 1; day <= days; day += 1) {
        const date = new Date(Number(year), monthNumber - 1, day);
        const weekday = date.getDay() || 7;
        cells.push({ day, label: labels[day] || autoCoefficientLabel(weekday), weekday });
      }
      while (cells.length % 7) cells.push(null);
      const weeks = [];
      for (let i = 0; i < cells.length; i += 7) {
        const weekCells = cells.slice(i, i + 7);
        const coefficient = weekCells.reduce((sum, item) => sum + coefficientValue(item?.label, brandId, store), 0);
        weeks.push({ cells: weekCells, coefficient });
      }
      const monthKey = String(monthNumber).padStart(2, "0");
      const sourceTotal = dailyCoefficientMonth(brandId, monthKey, store)?.total;
      const total = Number.isFinite(Number(sourceTotal)) ? Number(sourceTotal) : weeks.reduce((sum, item) => sum + item.coefficient, 0);
      return { year, month: monthKey, monthNumber, weeks, total, brandId, cityType: cityTypeForStore(store) };
    }

    function dailyCoefficientBrand(brandId) {
      const source = window.DAILY_COEFFICIENTS_2026?.brands || {};
      return source[brandId] || source.ertong || null;
    }

    function cityTypeForStore(store) {
      const city = String(store?.city || store?.name || "");
      return city.includes("郑州") ? "郑州市" : "地级市";
    }

    function dailyCoefficientConfig(brandId, store = null) {
      const brand = dailyCoefficientBrand(brandId);
      if (brandId === "zhiyou" && brand?.cityTypes) {
        const cityType = cityTypeForStore(store);
        const cityConfig = brand.cityTypes[cityType] || brand.cityTypes["地级市"] || brand.cityTypes["郑州市"];
        return cityConfig ? { ...brand, ...cityConfig, cityType } : brand;
      }
      return brand;
    }

    function dailyCoefficientMonth(brandId, month, store = null) {
      return dailyCoefficientConfig(brandId, store)?.months?.[String(month).padStart(2, "0")] || null;
    }

    function coefficientLabels(year, month, days, brandId = "ertong", store = null) {
      const monthData = String(year) === "2026" ? dailyCoefficientMonth(brandId, month, store) : null;
      if (monthData?.labels) return monthData.labels;
      const output = {};
      for (let day = 1; day <= days; day += 1) {
        const weekday = new Date(Number(year), month - 1, day).getDay() || 7;
        output[day] = autoCoefficientLabel(weekday);
      }
      return output;
    }

    function autoCoefficientLabel(weekday) {
      if (weekday >= 6) return "B";
      if (weekday === 5) return "E";
      return "F";
    }

    function coefficientValue(label, brandId = "ertong", store = null) {
      const coefficients = dailyCoefficientConfig(brandId, store)?.coefficients || {};
      return Number(coefficients[label] ?? { "A+": 1.67, A: 1.22, Z: 1.00, B: 1.00, C: 0.81, D: 0.50, E: 0.15, F: 0.05 }[label] ?? 0);
    }

    function coefficientPanel(view, months, zValue = 0, store = null, storeOptions = [], brands = []) {
      const weekNames = ["星期一", "星期二", "星期三", "星期四", "星期五", "星期六", "星期日"];
      const monthButtons = months.map(month => `
        <button class="month-pill ${month === view.month ? "active" : ""}" type="button" data-month="${month}"><span>${Number(month)}</span><em>月</em></button>
      `).join("");
      const panelBrandId = store?.brandId || view.brandId || "ertong";
      const targetForLabel = label => Number(zValue || 0) * coefficientValue(label, panelBrandId, store);
      const coefficientSource = dailyCoefficientConfig(panelBrandId, store);
      const coefficientLogic = [coefficientSource?.logicName || coefficientSource?.sheetName || "日等级表", coefficientSource?.cityType].filter(Boolean).join(" / ");
      const monthTarget = Number(store?.feishuTarget?.monthly?.[view.month]?.targetRevenue || 0);
      const brandOptions = [
        `<option value="all" ${data.coefficientBrandId === "all" ? "selected" : ""}>全部品类</option>`,
        ...brands.map(brand => `<option value="${brand.id}" ${data.coefficientBrandId === brand.id ? "selected" : ""}>${brand.name}</option>`)
      ].join("");
      const storeSelectOptions = storeOptions.map(item => `
        <option value="${item.id}" ${store?.id === item.id ? "selected" : ""}>${item.name}</option>
      `).join("");
      return `
        <div class="coefficient-panel">
          <div class="month-switcher">
            <div class="month-switcher-head"><span>目标月份</span><strong>${view.year} 年</strong></div>
            <div class="month-pills">${monthButtons}</div>
          </div>
          <div class="coefficient-summary">
            <div class="hero">
              <div class="coefficient-hero-main">
                <span>选中门店月目标</span>
                <strong>${wan2(monthTarget)}</strong>
              </div>
              <div class="coefficient-hero-facts">
                <span>${store?.name || "请选择门店"}</span>
                <span>Z值 ${rawTarget(zValue, 1)}</span>
                <span>本月总系数 ${view.total.toFixed(2)}</span>
              </div>
            </div>
          </div>
          <div class="coefficient-detail">
            <div class="coefficient-controls">
              <label>品类选择<select id="coefficientBrandFilter">${brandOptions}</select></label>
              <label>门店选择<select id="coefficientStoreFilter">${storeSelectOptions}</select></label>
            </div>
            <div class="coefficient-store-note">
              <b>${store?.name || "当前门店"}</b>，${view.monthNumber}月飞书 Z值 <b>${rawTarget(zValue, 1)}</b>。当前使用 <b>${coefficientLogic}</b>，每日目标 = Z值 × 日期系数，下方数字可直接抄。
            </div>
            <div class="coefficient-table">
              <table>
                <thead><tr>${weekNames.map(name => `<th>${name.replace("星期", "周")}</th>`).join("")}<th>周系数</th></tr></thead>
                <tbody>
                  ${view.weeks.map(week => `
                    <tr>
                      ${week.cells.map(item => item ? `
                        <td><div class="coefficient-day ${item.weekday >= 6 ? "is-weekend" : ""}"><b>${item.day}</b><em>${item.label}</em><small>${rawTarget(targetForLabel(item.label), 1)}</small></div></td>
                      ` : `<td><div class="coefficient-day empty"><b>-</b><em>-</em></div></td>`).join("")}
                      <td class="week-coefficient">${week.coefficient.toFixed(2)}</td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    }

    function barRows(items, maxValue) {
      return `
        <div class="bar-list" style="padding:0;">
          ${items.map(item => `
            <div class="bar-row">
              <span title="${item.name}">${shortName(item.name)}</span>
              <div class="bar-track"><i class="bar-target" style="width:${Math.max(4, Math.max(item.value, 0) / maxValue * 100)}%"></i></div>
              <strong>${wan(item.value)}</strong>
            </div>
          `).join("")}
        </div>
      `;
    }

    function profitRate(record) {
      if (!record) return 0;
      const target = Number(record.total?.targetRevenue || 0);
      return target ? Number(record.total?.profit || 0) / target : 0;
    }

    function shortName(name) {
      return String(name || "-")
        .replace("熊猫密室-", "")
        .replace("智妙小屋-", "")
        .replace("智妙视界-", "")
        .slice(0, 14);
    }

    function lineChart(targets, profits) {
      const width = 920;
      const height = 360;
      const pad = { left: 68, right: 38, top: 34, bottom: 46 };
      const values = [...targets, ...profits, 1];
      const max = Math.max(...values);
      const x = index => pad.left + index * ((width - pad.left - pad.right) / 11);
      const y = value => height - pad.bottom - (value / max) * (height - pad.top - pad.bottom);
      const targetPoints = targets.map((value, index) => `${x(index)},${y(value)}`).join(" ");
      const profitPoints = profits.map((value, index) => `${x(index)},${y(value)}`).join(" ");
      const grid = [0, 0.25, 0.5, 0.75, 1].map(rate => {
        const yy = y(max * rate);
        return `<line x1="${pad.left}" y1="${yy}" x2="${width - pad.right}" y2="${yy}" stroke="#d8e0e8"/><text x="18" y="${yy + 5}" fill="#667482" font-size="12">${wan(max * rate)}</text>`;
      }).join("");
      const labels = targets.map((_, index) => `<text x="${x(index)}" y="${height - 14}" text-anchor="middle" fill="#667482" font-size="12">${index + 1}月</text>`).join("");

      return `
        <svg class="line-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="月度目标与利润趋势图">
          <rect x="0" y="0" width="${width}" height="${height}" fill="#fff"/>
          ${grid}
          <polyline points="${targetPoints}" fill="none" stroke="#f47b20" stroke-width="4"/>
          <polyline points="${profitPoints}" fill="none" stroke="#c64638" stroke-width="4"/>
          ${targets.map((value, index) => `<circle cx="${x(index)}" cy="${y(value)}" r="4" fill="#f47b20"/>`).join("")}
          ${profits.map((value, index) => `<circle cx="${x(index)}" cy="${y(value)}" r="4" fill="#c64638"/>`).join("")}
          ${labels}
          <g transform="translate(${width - 250}, 30)">
            <rect width="180" height="36" rx="6" fill="#fff" stroke="#dce4ec"/>
            <circle cx="24" cy="18" r="6" fill="#f47b20"/><text x="40" y="23" fill="#263442" font-size="14">目标</text>
            <circle cx="102" cy="18" r="6" fill="#c64638"/><text x="118" y="23" fill="#263442" font-size="14">利润</text>
          </g>
        </svg>
      `;
    }

    function numberOr(value, fallback = 0) {
      if (value === "" || value === null || value === undefined) return fallback;
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function positiveOr(value, fallback = 0) {
      const number = numberOr(value, fallback);
      return number > 0 ? number : fallback;
    }

    function monthSeries(openDate, count = 12) {
      const match = String(openDate || "").match(/^(\d{4})-(\d{2})/);
      let year = match ? Number(match[1]) : 2026;
      let month = match ? Number(match[2]) : 8;
      return Array.from({ length: count }, () => {
        const label = `${year}-${String(month).padStart(2, "0")}`;
        month += 1;
        if (month > 12) {
          month = 1;
          year += 1;
        }
        return label;
      });
    }

    function signedMoney(value) {
      const number = Math.round(Number(value) || 0);
      return number < 0 ? `(${money(Math.abs(number))})` : money(number);
    }

    function pnlClass(value) {
      const number = Number(value) || 0;
      if (number > 0) return "pnl-positive";
      if (number < 0) return "pnl-negative";
      return "";
    }

    function brandTicket(brandName) {
      if (String(brandName || "").includes("儿童")) return 98;
      if (String(brandName || "").includes("闯关")) return 88;
      return 118;
    }

    function mallFromName(name) {
      const parts = String(name || "").split("·");
      if (parts.length >= 2) return parts.slice(1).join("·").replace(/店$/, "");
      return "";
    }

    function newStoreDisplayName(record = {}, fallback = "") {
      const mallName = String(record.mallName || "").trim();
      if (mallName.includes("郑州高新万达")) return "郑州高新万达";
      return mallName || String(record.storeName || "").trim() || fallback || "待填写";
    }

    function newStoreCityFromInvestment(record = {}, fallback = "") {
      const text = `${record.mallName || ""} ${record.sheetName || ""} ${record.location || ""}`;
      if (text.includes("武昌") || text.includes("武汉")) return "武汉";
      if (text.includes("郑州") || text.includes("中原万达") || text.includes("二七万达") || text.includes("高新万达") || text.includes("美盛天街")) return "郑州";
      return fallback || "";
    }

    function defaultNewStorePnlFromRecord(record = {}, existing = {}) {
      const monthly = record.monthly || {};
      const monthValues = Object.values(monthly).filter(item => Number(item?.targetRevenue || 0) > 0);
      const total = record.total || {};
      const annualRevenue = Number(total.targetRevenue || existing.target?.yearRevenue || 0);
      const annualProfit = Number(total.profit || existing.target?.yearProfit || 0);
      const annualFixedCost = Number(total.fixedCost || existing.target?.yearRent || 0);
      const variableCost = Number(total.variableCost || 0);
      const grossMarginRate = annualRevenue ? (annualRevenue - variableCost) / annualRevenue : Number(total.grossMarginRate || 0.6);
      const peakMonthRevenue = Math.max(0, ...monthValues.map(item => Number(item.targetRevenue || 0)));
      const lowMonthRevenue = Math.min(...monthValues.map(item => Number(item.targetRevenue || 0)).filter(Boolean), peakMonthRevenue || 0);
      const maxMonth = monthValues.reduce((best, item) => Number(item.targetRevenue || 0) > Number(best?.targetRevenue || 0) ? item : best, monthValues[0] || {});
      const zValue = Number(maxMonth.zValue || total.zValue || 0);
      const usableArea = Number(existing.area || existing.newStorePnl?.usableArea || Math.max(80, Math.round(annualRevenue / 32000)));
      const rentArea = Math.round(usableArea * 1.12);
      const themeArea = Math.round(usableArea * 0.68);
      const publicArea = Math.max(0, usableArea - themeArea);
      const themeCount = Math.max(1, Math.round(themeArea / 28));
      const avgPeoplePerSession = String(record.brandName || "").includes("闯关") ? 8 : 6;
      const maxDailySessions = String(record.brandName || "").includes("儿童") ? 8 : 7;
      const maxDailyVisitors = themeCount * avgPeoplePerSession * maxDailySessions;
      const avgSpend = brandTicket(record.brandName);
      const maxDailyRevenue = maxDailyVisitors * avgSpend;
      const staffConfig = Math.max(2, Math.round(Number(total.baseSalary || 0) / 12 / 5200));
      const investmentFromOld =
        Number(existing.engineering?.totalInvestment || 0) ||
        Number(existing.pnl?.totalInvestment || 0) ||
        Number(existing.pnl?.openingCost || 0) + Number(existing.pnl?.equipmentCost || 0) + Number(existing.pnl?.decorationCost || 0);
      const totalInvestment = investmentFromOld || Math.round(Math.max(350000, annualRevenue * 0.22));
      const netMarginRate = annualRevenue ? annualProfit / annualRevenue : 0;
      const paybackMonths = annualProfit > 0 ? totalInvestment / (annualProfit / 12) : 0;

      return {
        brandName: record.brandName || existing.brandName || existing.region || "其他品牌",
        storeName: record.storeName || existing.name || "",
        city: record.city || existing.city || "",
        mallName: existing.newStorePnl?.mallName || mallFromName(record.storeName || existing.name),
        location: existing.newStorePnl?.location || existing.location || "待填写",
        rentArea,
        usableArea,
        themeArea,
        publicArea,
        themeCount,
        avgPeoplePerSession,
        maxDailySessions,
        maxDailyVisitors,
        avgSpend,
        maxDailyRevenue,
        staffConfig,
        totalInvestment,
        zValue,
        annualRevenue,
        peakMonthRevenue,
        lowMonthRevenue,
        grossMarginRate,
        annualFixedCost,
        annualProfit,
        netMarginRate,
        paybackMonths
      };
    }

    function getNewStorePnl(store) {
      const base = store?.newStorePnl || defaultNewStorePnlFromRecord(store?.feishuTarget || {}, store || {});
      const normalized = { ...defaultNewStorePnlFromRecord(store?.feishuTarget || {}, store || {}), ...base };
      normalized.brandName ||= store?.brandName || store?.region || "其他品牌";
      normalized.storeName ||= store?.name || "待填写";
      normalized.city ||= store?.city || "";
      normalized.mallName ||= mallFromName(store?.name);
      normalized.location ||= "待填写";
      normalized.maxDailyVisitors = Number(normalized.maxDailyVisitors || 0) || Number(normalized.maxDailySessions || 0) * Number(normalized.avgPeoplePerSession || 0);
      normalized.maxDailyRevenue = Number(normalized.maxDailyRevenue || 0) || Number(normalized.maxDailyVisitors || 0) * Number(normalized.avgSpend || 0);
      normalized.netMarginRate = Number(normalized.netMarginRate || 0) || (Number(normalized.annualRevenue || 0) ? Number(normalized.annualProfit || 0) / Number(normalized.annualRevenue || 0) : 0);
      normalized.paybackMonths = Number(normalized.paybackMonths || 0) || (Number(normalized.annualProfit || 0) > 0 ? Number(normalized.totalInvestment || 0) / (Number(normalized.annualProfit || 0) / 12) : 0);
      if (store && !store.newStorePnl) store.newStorePnl = normalized;
      return normalized;
    }

    const pnlCategories = [
      ["investment", "投资概览"],
      ["area", "面积效率"],
      ["capacity", "接待能力"],
      ["revenue", "营收预测"],
      ["profit", "成本利润"],
      ["payback", "回本模型"]
    ];

    function pnlLevel(record) {
      const profit = Number(record.annualProfit || 0);
      const margin = Number(record.netMarginRate || 0);
      const payback = Number(record.paybackMonths || 0);
      if (profit <= 0) return { label: "亏损平衡", state: "亏损风险", className: "danger", tone: "red" };
      if (payback > 0 && payback <= 9) return { label: "卓越", state: "卓越", className: "ok", tone: "green" };
      if (payback > 0 && payback <= 12) return { label: "达标", state: "达标", className: "blue", tone: "blue" };
      return { label: "亏损平衡", state: margin < 0.15 ? "净利偏低" : "偏慢", className: "warn", tone: "orange" };
    }

    function pnlMarginTone(value) {
      const margin = Number(value || 0);
      if (margin >= 0.25) return "green";
      if (margin >= 0.15) return "blue";
      return margin <= 0 ? "red" : "orange";
    }

    function pnlPaybackTone(value) {
      const months = Number(value || 0);
      if (months > 0 && months <= 9) return "green";
      if (months <= 12) return "blue";
      return "orange";
    }

    function pnlRiskTips(record) {
      const tips = [];
      const investmentPerArea = Number(record.usableArea || 0) ? Number(record.totalInvestment || 0) / Number(record.usableArea || 0) : 0;
      if (Number(record.annualProfit || 0) <= 0) tips.push(["high", "当前模型存在亏损风险，不建议直接推进"]);
      if (Number(record.paybackMonths || 0) > 12) tips.push(["warn", "回本偏慢，需要复核租金、投入或营收假设"]);
      if (Number(record.netMarginRate || 0) < 0.15) tips.push(["warn", "净利率偏低，需关注固定成本和毛利率"]);
      if (investmentPerArea > 9000) tips.push(["warn", "单平投入偏高，需复核装修和设备预算"]);
      if (Number(record.maxDailyRevenue || 0) * 260 > Number(record.annualRevenue || 0) * 1.55) tips.push(["warn", "接待能力充足，但营收预测偏保守"]);
      if (!tips.length) tips.push(["ok", "核心指标暂未触发明显风险，可以进入下一轮复核"]);
      return tips;
    }

    function pnlRecords() {
      const newStoreMatchers = [
        name => name.includes("郑州") && name.includes("中原万达") && name.includes("新店"),
        name => name.includes("武昌万象"),
        name => name.includes("高新万达"),
        name => name.includes("二七万达") || name.includes("二七店"),
        name => name.includes("美盛天街")
      ];
      return data.stores
        .filter(store => !String(store.name || "").includes("汇总"))
        .filter(store => {
          const name = String(store.name || "");
          return newStoreMatchers.some(match => match(name));
        })
        .map(store => ({ store, record: getNewStorePnl(store) }));
    }

    function pnlFilteredRecords() {
      const brand = data.pnlBrand || "all";
      const storeIds = Array.isArray(data.pnlStoreIds)
        ? data.pnlStoreIds
        : (data.pnlStoreId && data.pnlStoreId !== "all" ? [data.pnlStoreId] : []);
      return pnlRecords().filter(item => {
        const record = item.record;
        const brandMatch =
          brand === "all" ||
          (brand === "other" ? !["儿童密室", "智游密室", "闯关挑战"].includes(record.brandName) : record.brandName === brand);
        const storeMatch = !storeIds.length || storeIds.includes(item.store.id);
        return brandMatch && storeMatch;
      });
    }

    function pnlSummary(records) {
      const list = records.map(item => item.record);
      const totalInvestment = list.reduce((sum, item) => sum + Number(item.totalInvestment || 0), 0);
      const annualRevenue = list.reduce((sum, item) => sum + Number(item.annualRevenue || 0), 0);
      const annualProfit = list.reduce((sum, item) => sum + Number(item.annualProfit || 0), 0);
      const annualFixedCost = list.reduce((sum, item) => sum + Number(item.annualFixedCost || 0), 0);
      const peakMonthRevenue = list.reduce((sum, item) => sum + Number(item.peakMonthRevenue || 0), 0);
      const lowMonthRevenue = list.reduce((sum, item) => sum + Number(item.lowMonthRevenue || 0), 0);
      const zValue = list.reduce((sum, item) => sum + Number(item.zValue || 0), 0);
      const grossMarginRate = annualRevenue
        ? list.reduce((sum, item) => sum + Number(item.grossMarginRate || 0) * Number(item.annualRevenue || 0), 0) / annualRevenue
        : 0;
      return {
        brandName: records.length === 1 ? list[0].brandName : "全部品牌",
        storeName: records.length === 1 ? list[0].storeName : `${records.length} 家门店汇总`,
        city: records.length === 1 ? list[0].city : "汇总",
        mallName: records.length === 1 ? list[0].mallName : "全部商场",
        location: records.length === 1 ? list[0].location : "汇总视图",
        rentArea: list.reduce((sum, item) => sum + Number(item.rentArea || 0), 0),
        usableArea: list.reduce((sum, item) => sum + Number(item.usableArea || 0), 0),
        themeArea: list.reduce((sum, item) => sum + Number(item.themeArea || 0), 0),
        publicArea: list.reduce((sum, item) => sum + Number(item.publicArea || 0), 0),
        themeCount: list.reduce((sum, item) => sum + Number(item.themeCount || 0), 0),
        avgPeoplePerSession: records.length ? list.reduce((sum, item) => sum + Number(item.avgPeoplePerSession || 0), 0) / records.length : 0,
        maxDailySessions: records.length ? list.reduce((sum, item) => sum + Number(item.maxDailySessions || 0), 0) / records.length : 0,

        totalInvestment,

    function pnlMoney(value) {
      const number = Number(value || 0);
      if (!number) return "待填写";
      return Math.abs(number) >= 10000 ? wan2(number) : `¥${money(Math.round(number))}`;
    }

    function pnlPercent(value) {
      return Number.isFinite(Number(value)) ? `${(Number(value || 0) * 100).toFixed(1)}%` : "待填写";
    }

    function pnlMonths(value) {
      const number = Number(value || 0);

    }

    function pnlStaffConfig(value, detail = "") {
      const total = Math.round(Number(value || 0));
      if (!total) return "待填写";
      const source = String(detail || "").trim();
      const lines = source
        .split(/\n|；|;/)
        .map(line => line.trim())
        .filter(Boolean);
      const parseLine = line => {
        const parts = [...line.matchAll(/(\d+(?:\.\d+)?)(?=\s*(?:个|人|店长|销售|前台|NPC|npc|员工|兼职|全职|运营|店员|导购|客服|收银)?)/g)]
          .map(match => Number(match[1]))
          .filter(number => number > 0);
        const sum = parts.reduce((total, number) => total + number, 0);
        return { parts, sum };
      };
      const exact = lines.map(parseLine).find(item => item.parts.length > 1 && Math.round(item.sum) === total);
      const any = lines.map(parseLine).find(item => item.parts.length > 1);
      const picked = exact || any;
	      return picked
	        ? `<span class="pnl-staff-value">${total} 人<span class="staff-detail">(${picked.parts.map(number => Math.round(number)).join("+")})</span></span>`
	        : `${total} 人`;
    }

    function buildPnlModel(store, override = {}) {
      const pnl = store.pnl || {};
      const target = store.target || {};
      const engineering = store.engineering || {};
      const roomCount = positiveOr(pnl.roomCount, 8);
      const operatingDays = positiveOr(pnl.operatingDays, 30);
      const sessionsPerRoom = positiveOr(pnl.sessionsPerRoom, 3.2);
      const avgGuestsPerSession = positiveOr(pnl.avgGuestsPerSession, 5.2) * numberOr(override.trafficFactor, 1);
      const avgTicket = positiveOr(pnl.avgTicket, 88) * numberOr(override.priceFactor, 1);
      const addOnRate = positiveOr(pnl.addOnRate, 8) / 100;
      const matureGrowthRate = positiveOr(pnl.matureGrowthRate, 2) / 100;
      const ramp = [
        positiveOr(pnl.rampMonth1, 45) / 100,
        positiveOr(pnl.rampMonth2, 60) / 100,
        positiveOr(pnl.rampMonth3, 75) / 100
      ];
      const platformFeeRate = positiveOr(pnl.platformFeeRate, 8) / 100;
      const materialCostRate = positiveOr(pnl.materialCostRate, 4) / 100;
      const managerCount = positiveOr(pnl.managerCount, 1);
      const managerSalary = positiveOr(pnl.managerSalary, 7500);
      const staffCount = positiveOr(pnl.staffCount, 5);
      const staffSalary = positiveOr(pnl.staffSalary, 4500);
      const partTimeCostPerSession = positiveOr(pnl.partTimeCostPerSession, 45);
      const welfareRate = positiveOr(pnl.welfareRate, 12) / 100;
      const commissionRate = positiveOr(pnl.commissionRate, 4) / 100;
      const rentCost = positiveOr(pnl.rentCost, store.rent || 36000);
      const utilitiesCost = positiveOr(pnl.utilitiesCost, 8500);
      const marketingCost = positiveOr(pnl.marketingCost, 18000);
      const managementFee = positiveOr(pnl.managementFee, 8000);
      const maintenanceCost = positiveOr(pnl.maintenanceCost, 4000);
      const decorationCost = positiveOr(pnl.decorationCost, engineering.decorationCost || 520000);
      const equipmentCost = positiveOr(pnl.equipmentCost, engineering.equipmentCost || 280000);
      const openingCost = positiveOr(pnl.openingCost, engineering.openingMiscCost || 180000);
      const residualRecovery = positiveOr(pnl.residualRecovery, 100000);
      const depreciationYears = Math.max(1, positiveOr(pnl.depreciationYears, 3));
      const months = monthSeries(store.openDate || pnl.openMonth);

      const matureTicketRevenue = roomCount * operatingDays * sessionsPerRoom * avgGuestsPerSession * avgTicket;
      let cumulativeCash = 0;
      const monthly = months.map((label, index) => {
        const rampFactor = index < 3 ? ramp[index] : Math.pow(1 + matureGrowthRate, index - 3);
        const availableSessions = roomCount * operatingDays * sessionsPerRoom;
        const soldSessions = availableSessions * rampFactor;
        const visitors = soldSessions * avgGuestsPerSession;
        const ticketRevenue = visitors * avgTicket;
        const addOnRevenue = ticketRevenue * addOnRate;
        const revenue = ticketRevenue + addOnRevenue;
        const platformFee = revenue * platformFeeRate;
        const materialCost = revenue * materialCostRate;
        const partTimeCost = soldSessions * partTimeCostPerSession;
        const variableCost = platformFee + materialCost + partTimeCost;
        const managerLabor = managerCount * managerSalary;
        const staffLabor = staffCount * staffSalary;
        const welfareCost = (managerLabor + staffLabor) * welfareRate;
        const commissionCost = revenue * commissionRate;
        const laborCost = managerLabor + staffLabor + welfareCost + commissionCost;
        const fixedCost = rentCost + utilitiesCost + marketingCost + managementFee + maintenanceCost;
        const ebitda = revenue - variableCost - laborCost - fixedCost;
        const depreciation = (decorationCost + equipmentCost) / depreciationYears / 12;
        const operatingProfit = ebitda - depreciation;
        const oneTimeCash = index === 0 ? -(decorationCost + equipmentCost + openingCost) : 0;
        const operatingCash = ebitda;
        cumulativeCash += oneTimeCash + operatingCash;
        return {
          label,
          rampFactor,
          availableSessions,
          soldSessions,
          visitors,
          avgTicket,
          ticketRevenue,
          addOnRevenue,
          revenue,
          platformFee,
          materialCost,
          partTimeCost,
          variableCost,
          managerLabor,
          staffLabor,
          welfareCost,
          commissionCost,
          laborCost,
          fixedCost,
          ebitda,
          depreciation,
          operatingProfit,
          netMargin: revenue ? operatingProfit / revenue : 0,
          oneTimeCash,
          operatingCash,
          cumulativeCash
        };
      });

      const total = monthly.reduce((sum, row) => {
        Object.keys(row).forEach(key => {
          if (typeof row[key] === "number") sum[key] = (sum[key] || 0) + row[key];
        });
        return sum;
      }, {});
      total.netMargin = total.revenue ? total.operatingProfit / total.revenue : 0;
      total.avgTicket = avgTicket;
      total.cumulativeCash = monthly.at(-1)?.cumulativeCash || 0;

      const averagePartTimeRate = total.revenue ? total.partTimeCost / total.revenue : 0;
      const breakEvenFixed = managerCount * managerSalary + staffCount * staffSalary +
        (managerCount * managerSalary + staffCount * staffSalary) * welfareRate +
        rentCost + utilitiesCost + marketingCost + managementFee + maintenanceCost +
        (decorationCost + equipmentCost) / depreciationYears / 12;
      const contributionRate = Math.max(0.01, 1 - platformFeeRate - materialCostRate - commissionRate - averagePartTimeRate);
      const breakEvenRevenue = breakEvenFixed / contributionRate;
      const breakEvenVisitors = breakEvenRevenue / Math.max(1, avgTicket * (1 + addOnRate));
      const paybackIndex = monthly.findIndex(row => row.cumulativeCash >= 0);

      return {
        assumptions: {
          roomCount,
          operatingDays,
          sessionsPerRoom,
          avgGuestsPerSession: positiveOr(pnl.avgGuestsPerSession, 5.2),
          avgTicket: positiveOr(pnl.avgTicket, 88),
          addOnRate: positiveOr(pnl.addOnRate, 8),
          rampMonth1: positiveOr(pnl.rampMonth1, 45),
          rampMonth2: positiveOr(pnl.rampMonth2, 60),
          rampMonth3: positiveOr(pnl.rampMonth3, 75),
          matureGrowthRate: positiveOr(pnl.matureGrowthRate, 2),
          platformFeeRate: positiveOr(pnl.platformFeeRate, 8),
          materialCostRate: positiveOr(pnl.materialCostRate, 4),
          managerCount,
          managerSalary,
          staffCount,
          staffSalary,
          partTimeCostPerSession,
          welfareRate: positiveOr(pnl.welfareRate, 12),
          commissionRate: positiveOr(pnl.commissionRate, 4),
          rentCost,
          utilitiesCost,
          marketingCost,
          managementFee,
          maintenanceCost,
          decorationCost,
          equipmentCost,
          openingCost,
          residualRecovery,
          depreciationYears
        },
        months,
        monthly,
        total,
        investment: decorationCost + equipmentCost + openingCost,
        residualRecovery,
        breakEvenRevenue,
        breakEvenVisitors,
        paybackMonths: paybackIndex >= 0 ? paybackIndex + 1 : 0,
        targetProfit: numberOr(target.monthProfit, store.targetProfit || 0)
      };
    }

    function renderPnlLineChart(model) {
      const width = 900;
      const height = 260;
      const pad = { top: 22, right: 22, bottom: 34, left: 74 };
      const series = [
        { name: "营业收入", color: "#f47b20", values: model.monthly.map(row => row.revenue) },
        { name: "营业利润", color: "#c64638", values: model.monthly.map(row => row.operatingProfit) },
        { name: "累计现金流", color: "#16885e", values: model.monthly.map(row => row.cumulativeCash) }
      ];
      const allValues = series.flatMap(item => item.values);
      let min = Math.min(0, ...allValues);
      let max = Math.max(1, ...allValues);
      if (max === min) max = min + 1;
      const x = index => pad.left + index * ((width - pad.left - pad.right) / Math.max(1, model.monthly.length - 1));
      const y = value => pad.top + (max - value) * ((height - pad.top - pad.bottom) / (max - min));
      const grid = [0, 0.25, 0.5, 0.75, 1].map(rate => {
        const value = min + (max - min) * (1 - rate);
        const yy = pad.top + rate * (height - pad.top - pad.bottom);
        return `<line x1="${pad.left}" y1="${yy}" x2="${width - pad.right}" y2="${yy}" stroke="#d8e0e8"/><text x="12" y="${yy + 4}" fill="#667482" font-size="12">${wan(value)}</text>`;
      }).join("");
      const zeroLine = min < 0 && max > 0 ? `<line x1="${pad.left}" y1="${y(0)}" x2="${width - pad.right}" y2="${y(0)}" stroke="#9aa8b6" stroke-dasharray="5 5"/>` : "";
      const lines = series.map(item => {
        const points = item.values.map((value, index) => `${x(index)},${y(value)}`).join(" ");
        return `<polyline points="${points}" fill="none" stroke="${item.color}" stroke-width="4"/>${item.values.map((value, index) => `<circle cx="${x(index)}" cy="${y(value)}" r="4" fill="${item.color}"/>`).join("")}`;
      }).join("");
      const labels = model.monthly.map((row, index) => `<text x="${x(index)}" y="${height - 12}" text-anchor="middle" fill="#667482" font-size="11">${row.label.slice(5)}</text>`).join("");
      const legend = series.map((item, index) => `<circle cx="${width - 250 + index * 82}" cy="18" r="5" fill="${item.color}"/><text x="${width - 240 + index * 82}" y="22" fill="#263442" font-size="12">${item.name}</text>`).join("");
      return `
        <svg class="pnl-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="新店损益趋势图">
          <rect x="0" y="0" width="${width}" height="${height}" fill="#fff"/>
          ${grid}
          ${zeroLine}
          ${lines}
          ${labels}
          <g>${legend}</g>
        </svg>
      `;
    }

      const cellStyle = value => {

        const red = Math.round(255 - scale * 76);

        const blue = Math.round(222 - scale * 80);
        return `background: rgb(${red}, ${green}, ${blue});`;

      return `

        const readSelected = () => [...group.querySelectorAll("input[type='checkbox']:checked")]

    function openingTemplate() {
      return window.OPENING_EXECUTION_TEMPLATE || { stages: [], categories: [], statuses: ["未开始", "进行中", "已完成"], tasks: [], adSlots: [] };
    }

    function openingProjects() {
      const include = ["中原万达", "武昌万象", "美盛天街"];
      const exclude = ["二七万达", "高新万达"];
      const records = Array.isArray(data.newStoreInvestment?.records) ? data.newStoreInvestment.records : [];
      const projects = records
        .filter(record => {
          const text = `${record.sheetName || ""}${record.storeName || ""}${record.mallName || ""}`;
          return include.some(keyword => text.includes(keyword)) && !exclude.some(keyword => text.includes(keyword));
        })
        .map(record => ({
          id: `investment:${record.id || record.sheetName}`,
          name: openingProjectName(record),
          city: record.mallName || record.city || "",
          brandName: record.brandName || "",
          record
        }));
      if (projects.length) return projects;
      return data.stores
        .filter(item => {
          const text = `${item.name || ""}${item.city || ""}`;
          return include.some(keyword => text.includes(keyword)) && !exclude.some(keyword => text.includes(keyword));
        })
        .map(item => ({ id: `store:${item.id}`, name: item.name, city: item.city || "", brandName: item.brandName || item.region || "", store: item }));
    }

    function openingProjectName(record = {}) {
      const mall = record.mallName || record.sheetName || record.storeName || "新店";
      const brand = record.brandName || "";
      return brand ? `${mall} · ${brand}` : mall;
    }

    function openingProjectOpenDate(project = {}) {
      const source = project.record || project.store || {};
      const raw = source.openDate || source.openingDate || source.expectedOpenDate || source.expectedOpeningDate || "";
      const text = String(raw || "").trim();
      const match = text.match(/^(\d{4})[-/.年](\d{1,2})[-/.月](\d{1,2})/);
      if (!match) return "";
      return `${match[1]}-${String(match[2]).padStart(2, "0")}-${String(match[3]).padStart(2, "0")}`;
    }

    function openingState(project) {
      data.openingExecution ||= {};
      const state = data.openingExecution[project.id] ||= {
        openDate: openingProjectOpenDate(project),
        owner: "",
        taskStatus: {},
        taskNotes: {},
        adStatus: {},
        adNotes: {}
      };
      return state;
    }

    function openingStage(stageId) {
      return openingTemplate().stages.find(item => item.id === stageId) || { id: stageId, label: stageId || "未分阶段", offset: null };
    }

    function openingDeadline(openDate, stageId) {
      const stage = openingStage(stageId);
      if (!openDate || stage.offset === null || stage.offset === undefined) return "";
      const date = new Date(`${openDate}T00:00:00`);
      if (Number.isNaN(date.getTime())) return "";
      date.setDate(date.getDate() + Number(stage.offset || 0));
      return date.toISOString().slice(0, 10);
    }

    function openingDayDiff(dateText) {
      if (!dateText) return null;
      const target = new Date(`${dateText}T00:00:00`);
      if (Number.isNaN(target.getTime())) return null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return Math.ceil((target - today) / 86400000);
    }

    function openingCycleInfo(openDate) {
      const diff = openingDayDiff(openDate);
      if (diff === null) {
        return {
          headline: "先填预计开业日",
          detail: "填好后按开业前20天自动排任务",
          percent: 0,
          shortText: "未设置开业日"
        };
      }
      if (diff > 20) {
        const startsIn = diff - 20;
        return {
          headline: `距离开荒开始 ${startsIn} 天`,
          detail: `开荒一般按20天推进，当前距离开业 ${diff} 天`,
          percent: 0,
          shortText: `距开荒开始 ${startsIn} 天`
        };
      }
      if (diff > 0) {
        const day = Math.min(20, Math.max(1, 21 - diff));
        const percent = Math.min(100, Math.max(5, Math.round((day / 20) * 100)));
        return {
          headline: `开荒第 ${day} 天 / 20 天`,
          detail: `距离开业还有 ${diff} 天，按阶段把到期任务做完`,
          percent,
          shortText: `开荒第 ${day} 天，距开业 ${diff} 天`
        };
      }
      if (diff === 0) {
        return {
          headline: "今天开业",
          detail: "重点确认线上平台、物料、人员和现场接待",
          percent: 100,
          shortText: "今天开业"
        };
      }
      return {
        headline: `已开业 ${Math.abs(diff)} 天`,
        detail: "继续跟进开业后复盘、账单和平台运营动作",
        percent: 100,
        shortText: `已开业 ${Math.abs(diff)} 天`
      };
    }

    function openingDateClass(dateText, status) {
      if (status === "已完成") return "";
      const diff = openingDayDiff(dateText);
      if (diff === null) return "";
      if (diff < 0) return "overdue";
      if (diff <= 7) return "soon";
      return "";
    }

    function openingStatusClass(status) {
      if (status === "已完成") return "ok";
      if (status === "进行中") return "warn";
      return "blue";
    }

    function openingPriorityRank(priority) {
      return { "高": 0, "中": 1, "低": 2 }[priority] ?? 3;
    }

    function openingPriorityClass(priority) {
      if (priority === "高") return "high";
      if (priority === "中") return "medium";
      return "low";
    }

    function openingStageRank(stageId) {
      const order = ["pre20", "ready_now", "pre15", "pre10", "pre7", "pre5", "pre3", "pre1", "post_open"];
      const index = order.indexOf(stageId);
      if (index >= 0) return index;
      const stages = openingTemplate().stages || [];
      const fallbackIndex = stages.findIndex(stage => stage.id === stageId);
      return fallbackIndex >= 0 ? fallbackIndex + 100 : 999;
    }

    function openingProgress(project, tasks = openingTemplate().tasks) {
      const state = openingState(project);
      const total = tasks.length;
      const done = tasks.filter(task => (state.taskStatus[task.id] || "未开始") === "已完成").length;
      return { total, done, percent: total ? Math.round((done / total) * 100) : 0 };
    }

      data.openingBrand ||= "all";
      const brandOptions = [...new Set(projects.map(project => project.brandName || "未填品牌"))];
      if (data.openingBrand !== "all" && !brandOptions.includes(data.openingBrand)) data.openingBrand = "all";
      const visibleProjects = data.openingBrand === "all"
        ? projects
        : projects.filter(project => (project.brandName || "未填品牌") === data.openingBrand);
      if (!visibleProjects.some(project => project.id === data.openingProjectId)) data.openingProjectId = visibleProjects[0]?.id || projects[0].id;
      data.openingStage ||= "all";
      data.openingCategory ||= "all";
      data.openingStatus ||= "all";

      const project = visibleProjects.find(item => item.id === data.openingProjectId) || visibleProjects[0] || projects[0];
      const state = openingState(project);
      if (!state.openDate) state.openDate = openingProjectOpenDate(project);
      const allTasks = template.tasks || [];
      const progress = openingProgress(project, allTasks);
      const categoryOptions = [{ id: "all", name: "全部分类" }, ...(template.categories || [])];
      if (!categoryOptions.some(item => item.id === data.openingCategory || item.name === data.openingCategory)) data.openingCategory = "all";
      const selectedCategory = categoryOptions.find(item => item.id === data.openingCategory || item.name === data.openingCategory);
      const categoryMatches = task => data.openingCategory === "all"
        || task.category === data.openingCategory
        || (selectedCategory && task.category === selectedCategory.name);
      const stageOptions = [{ id: "all", label: "全部阶段" }, ...(template.stages || []).filter(stage => stage.id !== "all").sort((a, b) => openingStageRank(a.id) - openingStageRank(b.id))];
      if (!stageOptions.some(stage => stage.id === data.openingStage)) data.openingStage = "all";
      const stageMatches = task => data.openingStage === "all" || task.stage === data.openingStage;
      const filteredTasks = allTasks.filter(task => {
        const status = state.taskStatus[task.id] || "未开始";
        return categoryMatches(task)
          && stageMatches(task)
          && (data.openingStatus === "all" || status === data.openingStatus);
      }).sort((a, b) => {
        const stageDiff = openingStageRank(a.stage) - openingStageRank(b.stage);
        if (stageDiff) return stageDiff;
        const deadlineA = openingDeadline(state.openDate, a.stage) || "9999-12-31";
        const deadlineB = openingDeadline(state.openDate, b.stage) || "9999-12-31";
        if (deadlineA !== deadlineB) return deadlineA.localeCompare(deadlineB);
        const priorityDiff = openingPriorityRank(a.priority) - openingPriorityRank(b.priority);
        if (priorityDiff) return priorityDiff;
        return String(a.id || "").localeCompare(String(b.id || ""), undefined, { numeric: true });
      });
      const todayCount = allTasks.filter(task => {
        const status = state.taskStatus[task.id] || "未开始";
        const diff = openingDayDiff(openingDeadline(state.openDate, task.stage));
        return status !== "已完成" && diff === 0;
      }).length;
      const weekCount = allTasks.filter(task => {
        const status = state.taskStatus[task.id] || "未开始";
        const diff = openingDayDiff(openingDeadline(state.openDate, task.stage));
        return status !== "已完成" && diff !== null && diff >= 0 && diff <= 7;
      }).length;
      const overdueCount = allTasks.filter(task => {
        const status = state.taskStatus[task.id] || "未开始";
        const diff = openingDayDiff(openingDeadline(state.openDate, task.stage));
        return status !== "已完成" && diff !== null && diff < 0;
      }).length;
      const currentNeedCount = allTasks.filter(task => {
        const status = state.taskStatus[task.id] || "未开始";
        const diff = openingDayDiff(openingDeadline(state.openDate, task.stage));
        return status !== "已完成" && diff !== null && diff <= 0;
      }).length;
      const inProgressCount = allTasks.filter(task => (state.taskStatus[task.id] || "未开始") === "进行中").length;
      const filteredInProgressCount = filteredTasks.filter(task => (state.taskStatus[task.id] || "未开始") === "进行中").length;
      const cycle = openingCycleInfo(state.openDate);

      const statusOptions = ["all", ...(template.statuses || ["未开始", "进行中", "已完成"])];
      const brandSelectOptions = [`<option value="all" ${data.openingBrand === "all" ? "selected" : ""}>全部品牌</option>`]
        .concat(brandOptions.map(item => `<option value="${escapeHTML(item)}" ${data.openingBrand === item ? "selected" : ""}>${escapeHTML(item)}</option>`))
        .join("");
      const projectSelectOptions = visibleProjects.map(item => {
        const itemProgress = openingProgress(item, allTasks);
        return `<option value="${escapeHTML(item.id)}" ${item.id === project.id ? "selected" : ""}>${escapeHTML(item.name)}（${itemProgress.done}/${itemProgress.total}）</option>`;
      }).join("");
      const categoryTabs = categoryOptions.map(item => `
        <button type="button" class="${data.openingCategory === item.id ? "active" : ""}" data-opening-category="${escapeHTML(item.id)}">${escapeHTML(item.name)}</button>
      `).join("");
      const stageSelect = stageOptions.map(item => `<option value="${escapeHTML(item.id)}" ${data.openingStage === item.id ? "selected" : ""}>${escapeHTML(item.label)}</option>`).join("");
      const rows = renderOpeningTaskRows(filteredTasks, state);
      const adRows = renderOpeningAdRows(template.adSlots || [], state);
      const showAdSection = data.openingCategory === "all" || data.openingCategory === "公关相关";
      const taskCount = Number(template.sourceTaskCount || allTasks.length);

      els.formTitle.textContent = "新店开荒执行表";
      els.formHint.textContent = "按门店推进、按任务打勾，进度自动计算。";
      els.mainPanel.innerHTML = `
        <div class="opening-board">
          <div class="board-filters compact">
            <div class="opening-filter-row opening-top-row">
              <div class="field">
                <label>品牌筛选</label>
                <select id="openingBrandFilter">${brandSelectOptions}</select>
              </div>
              <div class="field">
                <label>门店筛选</label>
                <select id="openingProjectFilter">${projectSelectOptions}</select>
              </div>
              <div class="field">
                <label>预计开业日</label>
                <input id="openingOpenDate" type="date" value="${escapeHTML(state.openDate || "")}">
              </div>
              <div class="field">
                <label>主负责人</label>
                <input id="openingOwner" value="${escapeHTML(state.owner || "")}" placeholder="店长/城市经理">
              </div>
            </div>
            <div class="opening-category-strip">${categoryTabs}</div>
            <div class="opening-filter-row opening-control-row">
              <div class="field">
                <label>状态筛选</label>
                <select id="openingStatusFilter">${statusOptions.map(item => `<option value="${escapeHTML(item)}" ${data.openingStatus === item ? "selected" : ""}>${escapeHTML(item === "all" ? "全部状态" : item)}</option>`).join("")}</select>
	              </div>
	              <div class="field">
	                <label>阶段筛选</label>
	                <select id="openingStageFilter">${stageSelect}</select>
	              </div>
	            </div>
          </div>

          <div class="opening-plan">
            <div class="opening-plan-main">
              <span>20天开荒节奏</span>
              <strong>${cycle.headline}</strong>
              <div class="opening-progress"><i style="width:${cycle.percent}%"></i></div>
              <em>${cycle.detail}</em>
            </div>
            <div class="opening-kpi"><span>整体完成率</span><strong>${progress.percent}%</strong><em>${progress.done}/${progress.total} 条已完成</em></div>
            <div class="opening-kpi"><span>现在该做</span><strong>${currentNeedCount}</strong><em>今天到期或已经逾期</em></div>
            <div class="opening-kpi"><span>近7天要做</span><strong>${weekCount}</strong><em>未来7天内到期</em></div>
          </div>

          <div class="opening-kpis">
            <div class="opening-kpi"><span>逾期未完成</span><strong>${overdueCount}</strong><em>超过截止日仍未完成</em></div>
            <div class="opening-kpi"><span>今天到期</span><strong>${todayCount}</strong><em>今天必须处理</em></div>
            <div class="opening-kpi"><span>进行中</span><strong>${inProgressCount}</strong><em>已经开始但未完成</em></div>
            <div class="opening-kpi"><span>当前显示</span><strong>${filteredTasks.length}</strong><em>${selectedCategory?.name || "全部分类"} / ${data.openingStatus === "all" ? "全部状态" : data.openingStatus}</em></div>
          </div>

          <section class="opening-section">
            <div class="opening-section-head">
              <h4>店长开荒清单</h4>
              <span>${cycle.shortText}；当前显示 ${filteredTasks.length} 条，进行中 ${filteredInProgressCount} 条</span>
            </div>
            <div class="opening-task-list">
              ${rows || `<div class="empty">当前筛选下没有任务。</div>`}
            </div>
          </section>

          ${showAdSection ? `<section class="opening-section">
            <div class="opening-section-head">
              <h4>广告位专项表</h4>
              <span>用于公关广告位筛选和投放确认</span>
            </div>
            <div class="opening-table">
              <table>
                <thead><tr><th style="width:72px;">投放</th><th style="width:110px;">广告名称</th><th style="width:180px;">位置</th><th style="width:78px;">人流</th><th style="width:100px;">月租费用</th><th style="width:180px;">优势</th><th>详情</th><th style="width:160px;">备注</th></tr></thead>
                <tbody>${adRows || `<tr><td colspan="8" class="empty">暂无广告位模板。</td></tr>`}</tbody>
              </table>
            </div>
          </section>` : ""}

          <div class="source-line opening-source-line">
            <span>数据源：桌面开荒流程表（已导入 ${taskCount} 条任务 + ${(template.adSlots || []).length} 条广告位）+ 新店投资回报表；当前不展示二七万达、高新万达</span>
            <a href="${OPENING_EXECUTION_SOURCE_URL}" target="_blank" rel="noopener">打开飞书开荒源表</a>
          </div>
        </div>
      `;

      bindOpeningEvents(project);
    }

    function renderOpeningTaskRows(tasks, state) {
      let lastCategory = "";
      return tasks.map(task => {
        const status = state.taskStatus[task.id] || "未开始";
        const deadline = openingDeadline(state.openDate, task.stage);
        const stage = openingStage(task.stage);
        const categoryRow = task.category !== lastCategory
          ? `<div class="opening-task-group">${escapeHTML(task.category || "未分类")}</div>`
          : "";
        lastCategory = task.category;
        return `${categoryRow}
          <div class="opening-task-card ${status === "已完成" ? "done" : ""}">
            <div class="opening-task-check">
              <input class="opening-done" type="checkbox" data-opening-done="${escapeHTML(task.id)}" ${status === "已完成" ? "checked" : ""}>
            </div>
            <div>
              <div class="opening-task-title">${escapeHTML(task.title)}</div>
              ${task.group ? `<span class="opening-task-meta">小组：${escapeHTML(task.group)}</span>` : ""}
              <div class="opening-task-badges">
                <span class="opening-date ${openingDateClass(deadline, status)}">截止：${deadline || "待填"}</span>
                <span>阶段：${escapeHTML(stage.label)}</span>
                <span>分类：${escapeHTML(task.category || "-")}</span>
                <span>对接：${escapeHTML(task.owner || task.contact || "-")}</span>
                <span class="opening-priority ${openingPriorityClass(task.priority)}">优先级：${escapeHTML(task.priority || "中")}</span>
              </div>
            </div>
            <div class="opening-task-actions">
              <select data-opening-status="${escapeHTML(task.id)}">${(openingTemplate().statuses || ["未开始", "进行中", "已完成"]).map(item => `<option ${item === status ? "selected" : ""}>${escapeHTML(item)}</option>`).join("")}</select>
              <input data-opening-note="${escapeHTML(task.id)}" value="${escapeHTML(state.taskNotes[task.id] || "")}" placeholder="卡点/补充">
            </div>
          </div>`;
      }).join("");
    }

    function renderOpeningAdRows(adSlots, state) {
      return adSlots.map(item => `
        <tr>
          <td><input class="opening-done" type="checkbox" data-opening-ad="${escapeHTML(item.id)}" ${state.adStatus[item.id] ? "checked" : ""}></td>
          <td>${escapeHTML(item.name)}</td>
          <td class="detail-cell">${escapeHTML(item.position)}</td>
          <td>${escapeHTML(item.traffic)}</td>
          <td>${escapeHTML(item.rent)}</td>
          <td class="detail-cell">${escapeHTML(item.advantage)}</td>
          <td class="detail-cell">${escapeHTML(item.detail)}</td>
          <td><input data-opening-ad-note="${escapeHTML(item.id)}" value="${escapeHTML(state.adNotes[item.id] || "")}" placeholder="谈价/投放周期"></td>
        </tr>
      `).join("");
    }

    function bindOpeningEvents(project) {
      const state = openingState(project);
      document.getElementById("openingBrandFilter")?.addEventListener("change", event => {
        data.openingBrand = event.target.value;
        const projects = openingProjects();
        const visibleProjects = data.openingBrand === "all"
          ? projects
          : projects.filter(item => (item.brandName || "未填品牌") === data.openingBrand);
        data.openingProjectId = visibleProjects[0]?.id || projects[0]?.id || "";
        saveData();
        render();
      });
      document.getElementById("openingProjectFilter")?.addEventListener("change", event => {
        data.openingProjectId = event.target.value;
        saveData();
        render();
      });
      document.getElementById("openingOpenDate")?.addEventListener("change", event => {
        state.openDate = event.target.value;
        saveData();
        render();
      });
      document.getElementById("openingOwner")?.addEventListener("input", event => {
        state.owner = event.target.value;
        saveData();
      });
      document.querySelectorAll("[data-opening-category]").forEach(button => {
        button.addEventListener("click", event => {
          data.openingCategory = event.currentTarget.dataset.openingCategory || "all";
          data.openingStatus = "all";
          saveData();
          render();
        });
      });
      document.getElementById("openingCategoryFilter")?.addEventListener("change", event => {
        data.openingCategory = event.target.value;
        data.openingStatus = "all";
        saveData();
        render();
      });
      document.getElementById("openingStatusFilter")?.addEventListener("change", event => {
        data.openingStatus = event.target.value;
        saveData();
        render();
      });
      document.getElementById("openingStageFilter")?.addEventListener("change", event => {
        data.openingStage = event.target.value;
        saveData();
        render();
      });
      document.querySelectorAll("[data-opening-done]").forEach(input => {
        input.addEventListener("change", event => {
          state.taskStatus[event.target.dataset.openingDone] = event.target.checked ? "已完成" : "未开始";
          saveData();
          render();
        });
      });
      document.querySelectorAll("[data-opening-status]").forEach(select => {
        select.addEventListener("change", event => {
          state.taskStatus[event.target.dataset.openingStatus] = event.target.value;
          saveData();
          render();
        });
      });
      document.querySelectorAll("[data-opening-note]").forEach(input => {
        input.addEventListener("input", event => {
          state.taskNotes[event.target.dataset.openingNote] = event.target.value;
          saveData();
        });
      });
      document.querySelectorAll("[data-opening-ad]").forEach(input => {
        input.addEventListener("change", event => {
          state.adStatus[event.target.dataset.openingAd] = event.target.checked;
          saveData();
        });
      });
      document.querySelectorAll("[data-opening-ad-note]").forEach(input => {
        input.addEventListener("input", event => {
          state.adNotes[event.target.dataset.openingAdNote] = event.target.value;
          saveData();
        });
      });
    }

    function renderAcceptanceForm(store) {
      const acceptance = store.acceptance || {};
      els.mainPanel.innerHTML = `
        <div class="alert">产品验收建议用分数 + 问题 + 整改人管理，低于 85 分的项目必须复验。</div>
        <div class="form-grid" data-form="acceptance">
          ${field("productScore", "产品标准分", acceptance.productScore, "number")}
          ${field("displayScore", "陈列分", acceptance.displayScore, "number")}
          ${field("tasteScore", "口味/体验分", acceptance.tasteScore, "number")}
          ${field("serviceScore", "服务话术分", acceptance.serviceScore, "number")}
          ${field("owner", "整改负责人", acceptance.owner)}
          ${textareaField("problem", "问题与整改要求", acceptance.problem, "full")}
        </div>
        ${scoreBoard(store)}
      `;
    }

    function scoreBoard(store) {
      return "";
    }

    function renderSide() {
      const store = getStore();
      if (!store) return;

      els.sideStatus.innerHTML = followOptions.map(option => `<option ${option === store.followStatus ? "selected" : ""}>${option}</option>`).join("");
      els.sideNote.value = store.note || "";
    }

    function formValues() {
      const form = els.mainPanel.querySelector("[data-form]");
      if (!form) return { type: "", values: {} };
      const values = {};
      form.querySelectorAll("input, select, textarea").forEach(input => {
        values[input.name] = input.type === "number" ? Number(input.value || 0) : input.value.trim();
      });
      return { type: form.dataset.form, values };
    }

    function saveCurrentForm() {
      const store = getStore();
      if (!store) return;
      const { type, values } = formValues();

      if (type === "store") {
        const oldId = store.id;
        Object.assign(store, values);
        if (!store.id) store.id = oldId;
        data.selectedStoreId = store.id;
      } else if (type) {
        if (store.feishuTarget && type === "target") {
          persist("飞书目标表为同步数据，请在飞书源表修改");
          return;
        }
        store[type] = { ...(store[type] || {}), ...values };
        if (type === "target") {
          store.targetProfit = Number(values.monthProfit || store.targetProfit || 0);
          store.actualProfit = Number(values.monthActualProfit || store.actualProfit || 0);
        }
        if (type === "pnl") {
          const model = buildPnlModel(store);
          const firstMonth = model.monthly[0] || {};
          Object.assign(store.pnl, {
            firstMonthRevenue: roundMoney(firstMonth.revenue),
            firstMonthCost: roundMoney(firstMonth.variableCost),
            laborCost: roundMoney(firstMonth.laborCost),
            rentCost: roundMoney(model.assumptions.rentCost),
            netProfit: roundMoney(firstMonth.operatingProfit),
            firstYearRevenue: roundMoney(model.total.revenue),
            firstYearProfit: roundMoney(model.total.operatingProfit),
            totalInvestment: roundMoney(model.investment),
            paybackMonths: model.paybackMonths,
            breakEvenRevenue: roundMoney(model.breakEvenRevenue),
            breakEvenVisitors: roundMoney(model.breakEvenVisitors)
          });
          store.actualProfit = roundMoney(firstMonth.operatingProfit);
        }
        if (type === "engineering") {
          const totalInvestment =
            Number(values.decorationCost || 0) +
            Number(values.equipmentCost || 0) +
            Number(values.fireCost || 0) +
            Number(values.designCost || 0) +
            Number(values.rentDeposit || 0) +
            Number(values.openingMiscCost || 0);
          store.engineering.totalInvestment = totalInvestment;
          store.engineering.paybackMonths = Number(values.expectedMonthlyProfit || 0) > 0
            ? totalInvestment / Number(values.expectedMonthlyProfit || 0)
            : 0;
        }
      }

      if (els.sideStatus.value) store.followStatus = els.sideStatus.value;
      store.note = els.sideNote.value;
      persist("已保存当前门店");
    }

    function addStore() {
      const nextNumber = String(data.stores.length + 1).padStart(3, "0");
      const store = structuredClone(defaultData.stores[1]);
      store.id = `PD${nextNumber}`;
      store.name = `熊猫新店${nextNumber}`;
      store.city = "";
      store.region = "";
      store.status = "筹备中";
      store.openDate = "";
      store.manager = "";
      store.targetProfit = 0;
      store.actualProfit = 0;
      store.note = "";
      store.followStatus = "需运营支援";
      data.stores.push(store);
      data.selectedStoreId = store.id;
      data.activeModule = "dashboard";
      persist("已新增门店");
    }

    function deleteCurrentStore() {
      const store = getStore();
      if (!store) return;
      if (!confirm(`确定删除 ${store.name} 吗？`)) return;
      data.stores = data.stores.filter(item => item.id !== store.id);
      data.selectedStoreId = data.stores[0]?.id || "";
      persist("已删除门店");
    }

    function exportData() {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `熊猫门店经营系统数据_${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const incoming = JSON.parse(reader.result);
          if (!Array.isArray(incoming.stores)) throw new Error("数据格式不正确");
          data = incoming;
          data.activeModule ||= "dashboard";
          data.selectedStoreId ||= data.stores[0]?.id || "";
          persist("导入成功");
        } catch (error) {
          alert(`导入失败：${error.message}`);
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    }
  </script>
</body>
</html>
