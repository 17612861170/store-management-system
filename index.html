<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新店投资预测表</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --panel: #ffffff;
      --ink: #18212b;
      --muted: #6d7684;
      --line: #eadfd4;
      --soft: #fff5eb;
      --nav: #f47b20;
      --nav-2: #fff1e6;
      --brand: #f47b20;
      --brand-2: #d85f12;
      --brand-3: #9a430a;
      --warn: #b94a28;
      --ok: #16885e;
      --blue: #2d72d9;
      --shadow: 0 20px 55px rgba(92, 57, 28, 0.10);
      --shadow-soft: 0 10px 26px rgba(92, 57, 28, 0.07);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #fbf7f1 0%, #f4f6f9 62%, #f7f4ef 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }

    button, input, select, textarea { font: inherit; }

    .app {
      display: grid;
      grid-template-columns: 252px minmax(760px, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      background: linear-gradient(180deg, #f47b20 0%, #ef7f25 46%, #e96e18 100%);
      color: #fff;
      padding: 26px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: #fff;
      color: #e86d18;
      position: relative;
      overflow: hidden;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: #f47b20;
    }

    .brand-mark::before {
      width: 22px;
      height: 22px;
      left: 9px;
      top: 8px;
      box-shadow: 10px 10px 0 #ffd2a3;
    }

    .brand-mark::after {
      width: 10px;
      height: 10px;
      right: 9px;
      top: 10px;
    }

    .brand h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: #fff7ef;
      font-size: 12px;
      line-height: 1.45;
    }

    .nav-group {
      display: grid;
      gap: 9px;
      margin: 24px 0;
    }

    .nav-btn {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.10);
      color: #fff;
      border-radius: 12px;
      padding: 13px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .nav-btn strong {
      font-size: 14px;
      font-weight: 750;
    }

    .nav-btn span {
      min-width: 34px;
      text-align: right;
      color: #fff5eb;
    }

    .nav-btn.active {
      background: #ffffff;
      color: #8c3a08;
      border-color: #ffffff;
      box-shadow: 0 14px 30px rgba(135, 62, 15, 0.20);
    }

    .nav-note {
      border-top: 1px solid rgba(255,255,255,0.35);
      padding-top: 16px;
      color: #fff7ef;
      font-size: 12px;
      line-height: 1.7;
    }

    .main {
      min-width: 0;
      padding: 0 0 44px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(250, 248, 245, 0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 18px 24px;
    }

    .title h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      min-height: 38px;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 10px 22px rgba(244, 123, 32, 0.22);
    }

    .btn.source {
      border-color: #ffd3ac;
      background: #fff7ef;
      color: #9a430a;
    }

    .btn.danger {
      color: #b53b2c;
      border-color: #f0c9c0;
      background: #fff8f6;
    }

    .btn.icon {
      width: 36px;
      padding: 0;
      display: grid;
      place-items: center;
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(128px, 1fr));
      gap: 12px;
      padding: 0 24px 16px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 72px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .metric strong {
      font-size: 20px;
    }

    .content {
      padding: 20px 24px 0;
      display: grid;
      gap: 18px;
      min-width: 0;
    }

    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    th {
      background: #eaf3f7;
      color: #425163;
      font-size: 12px;
      font-weight: 700;
    }

    tr.active-row td {
      background: #f0f8f7;
    }

    tr:hover td {
      background: #f8fbfd;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      min-width: 54px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eef3f7;
      color: #526071;
      font-size: 12px;
      font-weight: 700;
    }

    .status.ok { background: #e7f6ef; color: var(--ok); }
    .status.warn { background: #fff1e9; color: var(--warn); }
    .status.blue { background: #e8f1ff; color: var(--blue); }
    .status.danger { background: #fff0ee; color: #c64638; }

    .workspace {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) 360px;
      gap: 16px;
      align-items: start;
    }

    .workspace.dashboard-mode {
      display: block;
    }

    .workspace.dashboard-mode .panel {
      border: 0;
      box-shadow: none;
      background: transparent;
      overflow: visible;
      min-width: 0;
    }

    .workspace.dashboard-mode .panel-head {
      display: none;
    }

    .workspace.dashboard-mode .panel-body {
      padding: 0;
    }

    .workspace.dashboard-mode .side-stack,
    .workspace.dashboard-mode .panel-head .actions {
      display: none;
    }

    .target-board-active .summary-row,
    .target-board-active .brand-filter {
      display: none;
    }

    .target-board-active .nav-note {
      display: none;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      min-height: 52px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-head h3 {
      margin: 0;
      font-size: 16px;
    }

    .panel-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .panel-body {
      padding: 16px;
      min-width: 0;
    }

    .alert {
      border: 1px solid #f0b7a8;
      border-left: 4px solid #d84f35;
      background: #fff8f5;
      color: #9b321e;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 14px;
      line-height: 1.55;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 10px;
    }

    .field {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      padding: 8px;
      min-height: 66px;
    }

    label {
      display: block;
      color: #5d7188;
      font-size: 12px;
      margin-bottom: 5px;
    }

    input, select, textarea {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--ink);
      font-weight: 700;
      min-height: 26px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      font-weight: 500;
      line-height: 1.5;
    }

    .wide { grid-column: span 2; }
    .full { grid-column: 1 / -1; }

    .score-list {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .target-meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .target-table {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-top: 14px;
    }

    .target-table table {
      min-width: 1120px;
      box-shadow: none;
    }

    .target-table th:first-child,
    .target-table td:first-child {
      position: sticky;
      left: 0;
      background: #fff;
      z-index: 1;
      font-weight: 700;
    }

    .source-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .source-line a {
      color: var(--brand);
      font-weight: 700;
      text-decoration: none;
    }

    .pnl-board {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .pnl-board > * {
      min-width: 0;
    }

    .pnl-filter-bar {
      display: grid;
      grid-template-columns: 190px minmax(240px, 1fr) minmax(320px, 1.4fr);
      gap: 10px;
      padding: 12px;
      border: 1px solid #ffd9b8;
      border-radius: 8px;
      background: #fff8f1;
      align-items: end;
    }

    .pnl-filter-bar label {
      display: block;
      margin-bottom: 6px;
      color: #8f3d08;
      font-size: 12px;
      font-weight: 900;
    }

    .pnl-store-filter {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) minmax(130px, 0.9fr);
      gap: 8px;
    }

    .pnl-filter-bar select,
    .pnl-filter-bar input {
      width: 100%;
      min-height: 38px;
      border: 1px solid #ffd3ac;
      border-radius: 8px;
      padding: 7px 9px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    .pnl-category-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pnl-category-tabs button {
      border: 1px solid #ffd3ac;
      border-radius: 999px;
      background: #fff;
      color: #9a430a;
      min-height: 34px;
      padding: 6px 10px;
      font-weight: 900;
      cursor: pointer;
    }

    .pnl-category-tabs button.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      box-shadow: 0 8px 18px rgba(244, 123, 32, 0.2);
    }

    .pnl-kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(128px, 1fr));
      gap: 12px;
    }

    .pnl-kpis .metric {
      min-height: 112px;
      border: 1px solid #f2d4ba;
      border-radius: 8px;
      padding: 14px;
      background: linear-gradient(180deg, #fff 0%, #fff8f1 100%);
      box-shadow: 0 12px 26px rgba(146, 92, 48, 0.08);
    }

    .pnl-kpis .metric strong {
      display: block;
      line-height: 1.2;
      font-size: 24px;
    }

    .pnl-kpis .metric em {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-style: normal;
      font-weight: 650;
    }

    .pnl-kpis .metric .status {
      margin-top: 8px;
    }

    .pnl-kpis .metric.risk-red {
      border-color: #f4b5ad;
      background: #fff4f2;
    }

    .pnl-kpis .metric.risk-orange {
      border-color: #ffd3ac;
      background: #fff7ef;
    }

    .pnl-kpis .metric.risk-blue {
      border-color: #b9d3ff;
      background: #f3f8ff;
    }

    .pnl-kpis .metric.risk-green {
      border-color: #addfc6;
      background: #f1fbf6;
    }

    .pnl-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .pnl-section.pnl-module {
      transition: opacity 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .pnl-focus-mode .pnl-module:not(.is-active-focus) {
      opacity: 0.38;
    }

    .pnl-module.is-active-focus {
      border-color: var(--brand);
      box-shadow: 0 16px 34px rgba(244, 123, 32, 0.16);
    }

    .pnl-section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      background: #fff7ef;
      border-bottom: 1px solid var(--line);
    }

    .pnl-section-head h4 {
      margin: 0;
      font-size: 15px;
    }

    .pnl-section-head span {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .pnl-metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr));
      gap: 10px;
      padding: 12px;
    }

    .pnl-mini-metric {
      border: 1px solid #f0dfd0;
      border-radius: 8px;
      background: #fffdf9;
      padding: 12px;
      min-height: 84px;
    }

    .pnl-mini-metric span {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .pnl-mini-metric strong {
      display: block;
      margin-top: 7px;
      font-size: 21px;
      color: var(--ink);
    }

    .pnl-mini-metric em {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-style: normal;
      font-size: 12px;
      line-height: 1.35;
    }

    .tip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff1e4;
      color: #9a430a;
      font-size: 11px;
      font-weight: 900;
      cursor: help;
    }

    .pnl-risk-list {
      display: grid;
      gap: 8px;
      padding: 12px;
    }

    .pnl-risk-item {
      border: 1px solid #f0dfd0;
      border-radius: 8px;
      background: #fffdf9;
      padding: 10px 12px;
      color: #425163;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 750;
    }

    .pnl-risk-item.high {
      border-color: #f4b5ad;
      background: #fff4f2;
      color: #a23127;
    }

    .pnl-risk-item.warn {
      border-color: #ffd3ac;
      background: #fff7ef;
      color: #9a430a;
    }

    .pnl-risk-item.ok {
      border-color: #addfc6;
      background: #f1fbf6;
      color: #16885e;
    }


    .pnl-detail-tools {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-bottom: 0;
      border-radius: 8px 8px 0 0;
      background: #fffaf4;
    }

    .pnl-detail-tools div {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pnl-detail-tools select {
      min-height: 34px;
      border: 1px solid #ffd3ac;
      border-radius: 8px;
      background: #fff;
      padding: 6px 8px;
      color: var(--ink);
      font: inherit;
      font-size: 12px;
      font-weight: 800;
    }

    .pnl-input-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(138px, 1fr));
      gap: 10px;
      padding: 12px;
    }

    .pnl-input-grid .field {
      background: #fffdf8;
    }

    .pnl-charts {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 0.8fr);
      gap: 12px;
    }

    .pnl-chart-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      overflow: hidden;
    }

    .pnl-chart-card h4 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .pnl-chart {
      width: 100%;
      height: 260px;
      display: block;
    }

    .pnl-bars {
      display: grid;
      gap: 10px;
      padding-top: 4px;
    }

    .pnl-bar {
      display: grid;
      grid-template-columns: 96px minmax(90px, 1fr) 88px;
      gap: 8px;
      align-items: center;
      font-size: 12px;
    }

    .pnl-bar-track {
      height: 13px;
      border-radius: 999px;
      background: #edf2f7;
      overflow: hidden;
    }

    .pnl-bar-track i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--brand);
    }

    .pnl-table {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      max-width: 100%;
      min-width: 0;
    }

    .pnl-table table {
      min-width: 1180px;
      box-shadow: none;
    }

    .pnl-table th,
    .pnl-table td {
      text-align: right;
    }

    .pnl-table th:first-child,
    .pnl-table td:first-child {
      position: sticky;
      left: 0;
      z-index: 1;
      text-align: left;
      font-weight: 800;
      background: #fff;
    }

    .pnl-table tr.section-row td {
      background: #eaf3f7;
      color: #425163;
      font-weight: 800;
      text-align: left;
    }

    .pnl-table tr.total-row td {
      background: #f7fbff;
      font-weight: 850;
    }

    .pnl-table tr.cash-row td {
      background: #fff8e8;
      font-weight: 850;
    }

    .pnl-negative {
      color: #c64638;
    }

    .pnl-positive {
      color: var(--ok);
    }

    .pnl-sensitivity {
      display: grid;
      grid-template-columns: minmax(280px, 0.8fr) minmax(360px, 1fr);
      gap: 12px;
    }

    .pnl-note-list {
      display: grid;
      gap: 8px;
      padding: 12px;
      color: #425163;
      line-height: 1.55;
      font-size: 13px;
    }

    .pnl-note-list b {
      color: var(--ink);
    }

    .pnl-simple {
      gap: 10px;
    }

    .pnl-simple-filter {
      position: relative;
      z-index: 4;
      padding: 10px 12px 12px;
      gap: 10px;
    }

    .pnl-filter-row {
      grid-template-columns: minmax(210px, 0.75fr) minmax(260px, 1fr);
      align-items: end;
    }

    .pnl-category-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 0 2px;
      scrollbar-width: none;
    }

    .pnl-category-strip::-webkit-scrollbar,
    .pnl-simple-kpis::-webkit-scrollbar,
    .pnl-simple-metrics::-webkit-scrollbar {
      display: none;
    }

    .pnl-category-strip button {
      flex: 0 0 auto;
      border: 1px solid #ffd3ac;
      border-radius: 999px;
      background: #fff;
      color: #9a430a;
      min-height: 34px;
      padding: 6px 12px;
      font: inherit;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .pnl-category-strip button.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      box-shadow: 0 8px 18px rgba(244, 123, 32, 0.2);
    }

    .pnl-filter-field {
      display: grid;
      gap: 7px;
      align-content: start;
    }

    .pnl-filter-field > span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .pnl-store-menu summary b {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .pnl-store-menu summary small {

      font-weight: 700;
      box-shadow: 0 8px 18px rgba(138, 71, 18, 0.035);

      box-shadow: 0 20px 42px rgba(244, 123, 32, 0.28);
      min-height: 60px;
      display: grid;
      grid-template-columns: 126px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      padding: 8px 10px;
      position: relative;
      overflow: hidden;
    }

    .coefficient-summary .hero::after {
      content: "";
      position: absolute;
      right: -46px;
      top: -56px;
      width: 88px;
      height: 88px;
      border: 16px solid rgba(255,255,255,0.16);
      border-radius: 50%;
    }

    .coefficient-hero-main,
    .coefficient-hero-facts {
      position: relative;
      z-index: 1;
    }

    .coefficient-hero-facts {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) minmax(70px, auto) minmax(94px, auto);
      align-items: center;
      justify-content: stretch;
      gap: 6px;
      max-width: none;
      min-width: 0;
    }

    .coefficient-hero-facts span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      padding: 4px 8px;
      border: 1px solid rgba(255,255,255,0.30);
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      color: #fff8ef;
      font-size: 11px;
      font-weight: 900;
      backdrop-filter: blur(8px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .coefficient-summary span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .coefficient-summary strong {
      display: block;
      font-size: 24px;
      line-height: 1.15;
    }

    .coefficient-summary .hero strong {
      font-size: 23px;
      color: #fff;
    }

    .coefficient-summary .hero span,
    .coefficient-summary .hero small {
      color: #fff8ef;
    }

    .coefficient-summary small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
      line-height: 1.4;
    }

    .coefficient-section-title {
      color: #8f3d08;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0;
      margin-top: 2px;
    }

    .coefficient-rule {
      display: grid;
      gap: 10px;
      border: 1px solid #ffd3ac;
      border-radius: 12px;
      background: #fffaf4;
      padding: 12px;
    }

    .coefficient-rule strong {
      color: #8f3d08;
      font-size: 14px;
    }

    .coefficient-rule p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 12px;
      font-weight: 700;
    }

    .coefficient-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .coefficient-tags span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 26px;
      border: 1px solid #ffd3ac;
      border-radius: 999px;
      background: #fff;
      color: #8f3d08;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 900;
    }

    .coefficient-controls {
      display: grid;
      grid-template-columns: minmax(150px, 0.8fr) minmax(240px, 1.2fr);
      gap: 10px;
      padding: 8px 10px;
      border-top: 1px solid #ffd3ac;
      background: #fffaf4;
    }

    .coefficient-controls label {
      display: grid;
      gap: 5px;
      color: #8f3d08;
      font-size: 12px;
      font-weight: 900;
    }

    .coefficient-controls select {
      width: 100%;
      min-height: 32px;
      border: 1px solid #ffd3ac;
      border-radius: 9px;
      background: #fff;
      color: var(--ink);
      padding: 6px 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      outline: none;
    }

    .coefficient-store-note {
      padding: 8px 10px;
      border-top: 1px solid #ffd3ac;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.5;
    }

    .coefficient-store-note b {
      color: #9a430a;
    }

    .coefficient-targets {
      border: 1px solid #ffd3ac;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .coefficient-targets table {
      min-width: 460px;
      box-shadow: none;
    }

    .coefficient-targets th,
    .coefficient-targets td {
      padding: 9px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .coefficient-targets th {
      background: #f47b20;
      color: #fff;
      font-weight: 900;
    }

    .coefficient-targets td:first-child {
      color: var(--ink);
      font-weight: 900;
    }

    .coefficient-targets td:last-child {
      color: #9a430a;
      font-weight: 900;
    }

    .week-list {
      display: grid;
      gap: 8px;
    }

    .week-row {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) 54px;
      gap: 9px;
      align-items: center;
      border: 1px solid #ffe0c4;
      border-radius: 12px;
      background: #fff;
      padding: 9px 10px;
      box-shadow: 0 8px 18px rgba(25, 36, 50, 0.035);
    }

    .week-row span {
      color: var(--muted);
      font-weight: 800;
      font-size: 12px;
    }

    .week-track {
      height: 10px;
      background: #ffe1c8;
      border-radius: 999px;
      overflow: hidden;
    }

    .week-track i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #f47b20 0%, #ff9a3d 100%);
      border-radius: 999px;
    }

    .week-row strong {
      text-align: right;
      color: #9a430a;
      font-size: 18px;
    }

    .coefficient-detail {
      border: 1px solid #ffd3ac;
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 16px 34px rgba(112, 62, 22, 0.08);
    }

    .coefficient-detail .coefficient-controls {
      border-top: 0;
    }

    .coefficient-detail summary {
      list-style: none;
      cursor: pointer;
      padding: 11px 12px;
      color: #9a430a;
      font-weight: 900;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      background: #fffaf4;
    }

    .coefficient-detail summary::-webkit-details-marker {
      display: none;
    }

    .coefficient-detail summary::after {
      content: "⌄";
    }

    .coefficient-detail[open] summary::after {
      content: "⌃";
    }

    .coefficient-table {
      overflow-x: auto;
      border-top: 1px solid #ffd3ac;
      background:
        linear-gradient(180deg, #fff 0%, #fffdf9 100%);
    }

    .coefficient-table table {
      min-width: 640px;
      table-layout: fixed;
      box-shadow: none;
    }

    .coefficient-table th,
    .coefficient-table td {
      text-align: center;
      padding: 6px 5px;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
    }

    .coefficient-table th {
      background: #fff7ef;
      color: #9a430a;
      font-size: 12px;
      height: 34px;
    }

    .coefficient-day {
      display: grid;
      gap: 3px;
      min-height: 50px;
      align-content: center;
    }

    .coefficient-day b {
      font-size: 15px;
      line-height: 1;
    }

    .coefficient-day em {
      font-style: normal;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 21px;
      margin: 0 auto;
      border-radius: 999px;
      background: #ffed00;
      color: #111923;
      font-weight: 900;
      font-size: 12px;
    }

    .coefficient-day small {
      display: block;
      color: #8f3d08;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.2;
    }

    .coefficient-day.empty {
      opacity: 0.35;
    }

    .coefficient-day.is-weekend b,
    .coefficient-day.is-holiday b {
      color: #d12f1f;
    }

    .week-coefficient {
      background: #fffaf4;
      color: #9a430a;
      font-size: 20px;
      font-weight: 900;
    }

    .chart-card {
      background: #fff;
      border: 1px solid #ead8c7;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(92, 57, 28, 0.08);
      min-width: 0;
    }

    .chart-head {
      padding: 18px 20px;
      border-bottom: 1px solid #ead8c7;
      background: linear-gradient(180deg, #fff 0%, #fffaf5 100%);
      position: relative;
    }

    .chart-head::before {
      content: "";
      position: absolute;
      left: 0;
      top: 18px;
      bottom: 18px;
      width: 5px;
      border-radius: 0 999px 999px 0;
      background: #f47b20;
    }

    .chart-head-tools {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .chart-head h4 {
      margin: 0;
      font-size: 20px;
      color: #18212b;
    }

    .chart-head p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .mini-filters {
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      flex: 0 0 auto;
    }

    .mini-menu {
      position: relative;
    }

    .mini-menu summary {
      list-style: none;
      min-height: 30px;
      border: 1px solid #ffd3ac;
      border-radius: 999px;
      background: #fff7ef;
      color: #9a430a;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .mini-menu summary::-webkit-details-marker {
      display: none;
    }

    .mini-menu summary::after {
      content: "⌄";
      color: #c65a12;
      font-size: 13px;
    }

    .mini-menu[open] summary::after {
      content: "⌃";
    }

    .mini-menu .mini-panel,
    .mini-menu .multi-check {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      left: auto;
      z-index: 12;
      min-width: 260px;
      background: #fff;
      border: 1px solid #ffd3ac;
      border-radius: 6px;
      box-shadow: var(--shadow);
    }

    .mini-menu .mini-panel {
      width: 300px;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mini-menu .mini-panel.mini-brand-panel {
      width: 220px;
      grid-template-columns: 1fr;
    }

    .mini-menu .multi-check {
      max-height: 240px;
      grid-template-columns: 1fr;
    }

    .line-chart {
      width: 100%;
      height: 380px;
      display: block;
    }

    .bar-list {
      display: grid;
      gap: 10px;
      padding: 16px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 150px minmax(120px, 1fr) 60px;
      gap: 10px;
      align-items: center;
      font-size: 12px;
    }

    .bar-track {
      position: relative;
      height: 14px;
      border-radius: 999px;
      background: #ffe1c8;
      overflow: hidden;
    }

    .bar-target,
    .bar-profit {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      border-radius: 999px;
    }

    .bar-target { background: #f47b20; }
    .bar-profit {
      background: #d98233;
      height: 7px;
      top: 3.5px;
    }

    .insight {
      border-left: 4px solid var(--brand);
      background: #f8fbfd;
      padding: 14px 16px;
      color: #425163;
      line-height: 1.6;
      font-weight: 700;
    }

    .score-item {
      display: grid;
      grid-template-columns: 1fr 76px 76px 76px;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: #fff;
      font-size: 13px;
    }

    .score-item strong {
      text-align: right;
    }

    .side-stack {
      display: grid;
      gap: 16px;
    }

    .checklist {
      display: grid;
      gap: 9px;
    }

    .check {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px;
    }

    .check input {
      width: 18px;
      height: 18px;
      accent-color: var(--brand);
    }

    .check b {
      font-size: 13px;
    }

    .check span {
      color: var(--muted);
      font-size: 12px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .brand-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 24px 16px;
    }

    .tab {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      min-height: 32px;
      padding: 6px 12px;
      cursor: pointer;
      color: #556678;
    }

    .tab.active {
      color: #fff;
      border-color: var(--brand);
      background: var(--brand);
      font-weight: 700;
    }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: #111923;
      color: #fff;
      border-radius: 6px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: 0.2s ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -8px);
    }

    @media (max-width: 1100px) {
      .board-grid { grid-template-columns: 1fr; }
      .coefficient-table table { min-width: 640px; }
      .coefficient-day { min-height: 50px; }
    }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 220px minmax(0, 1fr); }
      .summary-row { grid-template-columns: repeat(3, 1fr); }
      .workspace { grid-template-columns: 1fr; }
      .target-hero { grid-template-columns: 1fr; }
      .target-brand-board { grid-template-columns: 1fr; }
      .board-kpis { grid-template-columns: repeat(2, 1fr); }
      .brand-cards { grid-template-columns: 1fr; }
      .filter-row { grid-template-columns: repeat(3, minmax(150px, 1fr)); }
      .filter-summary { grid-column: 1 / -1; justify-self: start; text-align: left; }
      .pnl-filter-bar { grid-template-columns: 1fr; }
      .pnl-kpis { grid-template-columns: repeat(3, 1fr); }
      .pnl-metric-grid { grid-template-columns: repeat(2, minmax(150px, 1fr)); }
      .pnl-input-grid { grid-template-columns: repeat(3, 1fr); }
      .pnl-charts,
      .pnl-sensitivity { grid-template-columns: 1fr; }
      .pnl-filter-row { grid-template-columns: minmax(170px, 0.75fr) minmax(230px, 1fr); }
      .pnl-story { grid-template-columns: repeat(2, 1fr); }
      .pnl-simple-metrics { display: flex; }
      .opening-filter-row.opening-top-row { grid-template-columns: 1fr 1fr; }
      .opening-filter-row.opening-control-row { grid-template-columns: 1fr 1fr; }
      .opening-plan { grid-template-columns: 1fr 1fr; }
      .opening-kpis { grid-template-columns: repeat(2, 1fr); }
      .opening-task-card { grid-template-columns: 34px minmax(0, 1fr); }
      .opening-task-actions { grid-column: 2; grid-template-columns: 150px minmax(180px, 1fr); }
    }

    @media (max-width: 840px) {
      .app { display: block; }
      .sidebar {
        position: relative;
        height: auto;
      }
      .toolbar { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .target-board-active .content { padding: 16px; }
      .target-hero-main { min-height: 0; padding: 26px 24px; }
      .target-hero-title h3 { font-size: 28px; }
      .target-hero-metrics { grid-template-columns: 1fr; }
      .target-control-title { display: grid; }
      .target-control-title span { text-align: left; }
      .target-control-panel .quick-filters { display: grid; grid-template-columns: repeat(2, 1fr); border-radius: 14px; }
      .target-brand-main { align-items: flex-start; }
      .summary-row { grid-template-columns: repeat(2, 1fr); }
      .form-grid { grid-template-columns: repeat(2, 1fr); }
      .table-wrap { overflow-x: auto; }
      table { min-width: 880px; }
      .board-kpis { grid-template-columns: 1fr; }
      .brand-stats { grid-template-columns: repeat(2, 1fr); }
      .bar-row { grid-template-columns: 110px minmax(90px, 1fr) 50px; }
      .filter-row { grid-template-columns: 1fr; }
      .filter-menu .multi-check { position: static; box-shadow: none; min-width: 0; }
      .date-menu .date-panel { position: static; width: 100%; box-shadow: none; grid-template-columns: 1fr; }
      .filter-summary { grid-column: auto; }
      .chart-head-tools { display: grid; }
      .mini-filters { justify-content: flex-start; }
      .mini-menu .mini-panel,
      .mini-menu .multi-check { position: static; width: 100%; min-width: 0; box-shadow: none; margin-top: 6px; }
      .mini-menu .mini-panel { grid-template-columns: 1fr; }
      .coefficient-panel { padding: 8px; }
      .month-switcher { grid-template-columns: 1fr; }
      .month-pills { grid-template-columns: repeat(6, minmax(0, 1fr)); }
      .coefficient-summary .hero { display: grid; min-height: 0; }
      .coefficient-hero-facts { max-width: none; justify-content: flex-start; }
      .coefficient-controls { grid-template-columns: 1fr; padding: 8px; }
      .coefficient-store-note { padding: 8px; font-size: 12px; }
      .coefficient-table table { min-width: 620px; }
      .coefficient-day { min-height: 50px; }
      .coefficient-day b { font-size: 15px; }
      .coefficient-day em { min-width: 28px; height: 21px; font-size: 12px; }
      .coefficient-day small { font-size: 12px; }
      .pnl-store-filter { grid-template-columns: 1fr; }
      .pnl-kpis,
      .pnl-metric-grid,
      .pnl-input-grid { grid-template-columns: 1fr; }
      .pnl-section-head { display: grid; }
      .pnl-section-head span { text-align: left; }
      .pnl-bar { grid-template-columns: 80px minmax(80px, 1fr) 72px; }
      .pnl-story,
      .pnl-simple-metrics { grid-template-columns: 1fr; }
	      .pnl-simple-kpis { grid-template-columns: repeat(6, minmax(145px, 1fr)); }
      .pnl-brand-pills,
      .pnl-category-pills { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .pnl-simple-filter { position: static; }
      .pnl-filter-row { grid-template-columns: 1fr; }
      .opening-filter-row.opening-top-row,
      .opening-filter-row.opening-control-row,
      .opening-plan,
      .opening-kpis,
      .opening-task-card { grid-template-columns: 1fr; }
      .opening-task-actions { grid-column: auto; grid-template-columns: 1fr; }
      .opening-section-head { display: grid; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1>新店投资预测表</h1>
        </div>
      </div>

      <div class="nav-group" id="moduleNav"></div>

    </aside>

    <main class="main">
      <header class="topbar">
        <div class="toolbar">
          <div class="title">
            <h2 id="pageTitle">新店选址评估测算</h2>
            <p id="pageDesc">选择一家门店，查看和维护它的经营资料。</p>
          </div>
          <div class="actions">
            <a class="btn source" id="feishuSourceBtn" href="#" target="_blank" rel="noopener" hidden>飞书数据源</a>
            <button class="btn" id="exportBtn" title="导出当前浏览器中的系统数据">导出数据</button>
            <label class="btn" for="importFile" title="导入之前导出的 JSON 数据">导入数据</label>
            <input id="importFile" type="file" accept="application/json" hidden>
            <button class="btn primary" id="addStoreBtn">新增门店</button>
          </div>
        </div>
        <div class="summary-row" id="summaryRow"></div>
        <div class="brand-filter" id="brandFilter"></div>
      </header>

      <section class="content">
        <div class="table-wrap" id="storeTableWrap">
          <table>
            <thead>
              <tr>
                <th style="width: 86px;">门店编号</th>
                <th style="width: 170px;">门店名称</th>
                <th style="width: 90px;">城市</th>
                <th style="width: 100px;">状态</th>
                <th style="width: 108px;">开业日期</th>
                <th style="width: 90px;">店长</th>
                <th style="width: 110px;">目标利润</th>
                <th style="width: 110px;">实际利润</th>
                <th style="width: 90px;">达成率</th>
                <th style="width: 110px;">本周状态</th>
              </tr>
            </thead>
            <tbody id="storeRows"></tbody>
          </table>
        </div>

        <div class="workspace" id="workspace">
          <section class="panel" id="mainCard">
            <div class="panel-head">
              <div>
                <h3 id="formTitle">门店资料</h3>
                <p id="formHint">基础资料是整个系统的总开关。</p>
              </div>
              <div class="actions">
                <button class="btn danger" id="deleteBtn">删除</button>
                <button class="btn primary" id="saveBtn">保存</button>
              </div>
            </div>
            <div class="panel-body" id="mainPanel"></div>
          </section>

          <aside class="side-stack" id="sideStack">
            <section class="panel">
              <div class="panel-head">
                <div>
                  <h3>本场状态</h3>
                  <p>用于周会复盘和运营跟进。</p>
                </div>
              </div>
              <div class="panel-body">
                <div class="form-grid" style="grid-template-columns: 1fr;">
                  <div class="field">
                    <label>跟进状态</label>
                    <select id="sideStatus"></select>

    async function syncFeishuTargets() {
      let payload = INLINE_FEISHU_TARGETS;
      try {
        const response = await fetch(`${FEISHU_TARGET_SOURCE}?t=${Date.now()}`);
        if (response.ok) {
          const remotePayload = await response.json();
          if (Array.isArray(remotePayload.records) && remotePayload.records.length) {
            payload = remotePayload;
          }
        }
      } catch (error) {
        console.warn("外部数据文件读取失败，已使用内嵌三品牌数据。", error);
      }
      applyFeishuTargets(payload);
      saveData();
    }

    async function syncNewStoreInvestment() {
      let payload = window.NEW_STORE_INVESTMENT_RETURN || null;
      try {
        const response = await fetch(`${NEW_STORE_INVESTMENT_SOURCE}?t=${Date.now()}`);
        if (response.ok) {
          const remotePayload = await response.json();
          if (Array.isArray(remotePayload.records) && remotePayload.records.length) {
            payload = remotePayload;
          }
        }
      } catch (error) {
        console.warn("新店投资回报预算表读取失败，已使用本地内嵌底表数据。", error);
      }
      if (!payload || !Array.isArray(payload.records)) return;
      applyNewStoreInvestment(payload);
      saveData();
    }

    function applyFeishuTargets(payload) {
      data.feishuTargets = payload;
      data.activeBrand ||= "all";
      data.targetMonth ||= "year";
      data.targetStoreId ||= "all";
      const existingByName = new Map(data.stores.map(store => [store.name, store]));
      const targetStores = payload.records.map(record => {
        const existing = existingByName.get(record.storeName) || {};
        const isSummary = record.storeName.includes("汇总");
        const monthly = record.monthly || {};
        const currentMonth = monthly["07"] || Object.values(monthly).find(item => Number(item?.targetRevenue || 0) > 0) || {};
        const total = record.total || {};

        return {
          ...existing,
          id: record.id,
          name: record.storeName,
          city: record.city || existing.city || "",
          region: record.brandName || existing.region || "",
          brandId: record.brandId,
          brandName: record.brandName,
          storeType: record.storeType,
          status: isSummary ? "营业中" : (existing.status || "营业中"),
          openDate: existing.openDate || "",
          manager: existing.manager || "",
          area: existing.area || 0,
          rent: Math.round(Number(total.rent || 0) / 12),
          targetProfit: Math.round(Number(currentMonth.profit || 0)),
          actualProfit: Number(existing.actualProfit || 0),
          note: existing.note || `来源：${record.brandName || payload.sourceName}`,
          followStatus: existing.followStatus || "正常",
          checks: existing.checks || { cleaning: false, equipment: false, staff: false, material: false, product: false },
          feishuTarget: record,
          target: {
            yearRevenue: roundMoney(total.targetRevenue),
            yearGrossProfit: roundMoney(Number(total.targetRevenue || 0) - Number(total.variableCost || 0)),
            yearLabor: roundMoney(total.baseSalary),
            yearRent: roundMoney(total.rent),
            yearProfit: roundMoney(total.profit),
            monthRevenue: roundMoney(currentMonth.targetRevenue),
            monthProfit: roundMoney(currentMonth.profit),
            monthActualProfit: Number(existing.actualProfit || 0)
          },
          pnl: existing.pnl || {
            openingCost: 0,
            equipmentCost: 0,
            decorationCost: 0,
            firstMonthRevenue: 0,
            firstMonthCost: 0,
            laborCost: 0,
            rentCost: 0,
            marketingCost: 0,
            netProfit: 0
          },
          newStorePnl: existing.newStorePnl || defaultNewStorePnlFromRecord(record, existing),
          engineering: existing.engineering || {
            decorationCost: 0,
            equipmentCost: 0,
            fireCost: 0,
            designCost: 0,

            openingMiscCost: 0,

    function applyNewStoreInvestment(payload) {
      data.newStoreInvestment = payload;
      const records = Array.isArray(payload.records) ? payload.records : [];
      if (!records.length) return;
      data.stores = data.stores.map(store => {
        const investment = findNewStoreInvestment(store, records);
        if (!investment) return store;
        const defaultPnl = defaultNewStorePnlFromRecord(store.feishuTarget || {}, store);
        const newStorePnl = {
          ...defaultPnl,
          ...store.newStorePnl,
          ...newStorePnlFromInvestment(investment, store),
          isBottomTableActual: true,
          sourceName: payload.sourceName || "新店投资回报预算表",
          sourceFile: payload.sourceFile || "",
          sourceSheet: investment.sheetName || ""
        };
        const engineeringSummary = investment.engineeringSummary || {};
        return {
          ...store,
          area: Number(investment.usableArea || store.area || 0),
          newStoreInvestment: investment,
          newStorePnl,
          engineering: {
            ...(store.engineering || {}),
            decorationCost: roundMoney(engineeringSummary.decorationCost),
            equipmentCost: roundMoney(engineeringSummary.equipmentCost),
            fireCost: roundMoney(engineeringSummary.fireCost),
            designCost: roundMoney(engineeringSummary.designCost),
            openingMiscCost: roundMoney(engineeringSummary.openingMiscCost),
            rentDeposit: roundMoney(engineeringSummary.rentDeposit),
            prepaidCost: roundMoney(engineeringSummary.prepaidCost),
            depositCost: roundMoney(engineeringSummary.depositCost),
            totalInvestment: roundMoney(engineeringSummary.totalInvestment || investment.totalInvestment),
            expectedMonthlyProfit: roundMoney(Number(investment.annualProfit || 0) / 12),
            paybackMonths: Number(investment.paybackMonths || 0),
            projectStatus: "已导入底表",
            note: `来源：${payload.sourceName || "新店投资回报预算表"} / ${investment.sheetName || ""}`,
            actualItems: investment.engineeringItems || [],
            depositItems: investment.depositItems || [],
            sourceName: payload.sourceName || "新店投资回报预算表",
            sourceFile: payload.sourceFile || "",
            sourceSheet: investment.sheetName || ""
          }
        };
      });

    function findNewStoreInvestment(store = {}, records = []) {
      const name = String(store.name || "");
      const brand = String(store.brandName || store.region || "");
      const pick = (keyword, preferredBrand = "") => {
        const matches = records.filter(record => {
          const haystack = `${record.sheetName || ""} ${record.mallName || ""} ${record.storeName || ""}`;
          return haystack.includes(keyword);
        });
        if (!matches.length) return null;
        if (preferredBrand) {
          const exact = matches.find(record => String(record.brandName || "").includes(preferredBrand));
          if (exact) return exact;
        }
        return matches[0];
      };
      if (name.includes("中原万达")) {
        return pick("中原万达", brand.includes("智游") ? "智游" : (brand.includes("儿童") ? "儿童" : "智游"));
      }
      if (name.includes("武昌万象")) return pick("武昌万象", "儿童");
      if (name.includes("高新万达")) return pick("高新万达", "儿童");
      if (name.includes("二七万达") || name.includes("二七店")) return pick("二七万达", "儿童");
      if (name.includes("美盛天街")) return pick("美盛天街", "儿童");
      return null;
    }

    function newStorePnlFromInvestment(record = {}, store = {}) {
      const displayName = newStoreDisplayName(record, store.name || "");
      return {
        brandName: record.brandName || store.brandName || store.region || "其他品牌",
        storeName: displayName,
        sheetStoreName: record.storeName || "",
        city: newStoreCityFromInvestment(record, store.city || ""),
        mallName: record.mallName || mallFromName(store.name),
        location: record.location || "待填写",
        rentArea: Number(record.rentArea || 0),
        usableArea: Number(record.usableArea || 0),
        themeArea: Number(record.themeArea || 0),
        publicArea: Number(record.publicArea || 0),
        themeCount: Number(record.themeCount || 0),
        avgPeoplePerSession: Number(record.avgPeoplePerSession || 0),
        maxDailySessions: Number(record.maxDailySessions || 0),
        maxDailyVisitors: Number(record.maxDailyVisitors || 0),
        avgSpend: Number(record.avgSpend || 0),
        avgSpendText: record.avgSpendText || "",
        maxDailyRevenue: Number(record.maxDailyRevenue || 0),
        staffConfig: Number(record.staffConfig || 0),
        staffConfigText: record.staffConfigText || "",
        staffConfigDetail: record.leftDetails?.["员工数量"]?.detail || "",
        totalInvestment: Number(record.totalInvestment || 0),
        zValue: Number(record.zValue || 0),
        annualRevenue: Number(record.annualRevenue || 0),
        peakMonthRevenue: Number(record.peakMonthRevenue || 0),
        lowMonthRevenue: Number(record.lowMonthRevenue || 0),
        grossMarginRate: Number(record.grossMarginRate || 0),
        annualFixedCost: Number(record.annualFixedCost || 0),
        annualProfit: Number(record.annualProfit || 0),
        netMarginRate: Number(record.netMarginRate || 0),
        paybackMonths: Number(record.paybackMonths || 0)
      };
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        return raw ? JSON.parse(raw) : structuredClone(defaultData);
      } catch {
        return structuredClone(defaultData);
      }
    }

    function saveData() {
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
    }

    function persist(message) {
      saveData();
      render();
      showToast(message || "已保存");
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 1400);
    }

    function getStore() {
      const visible = visibleStores();
      return data.stores.find(store => store.id === data.selectedStoreId) || visible[0] || data.stores[0];
    }

    function visibleStores() {
      if (!data.activeBrand || data.activeBrand === "all") return data.stores;
      return data.stores.filter(store => store.brandId === data.activeBrand);
    }

    function money(value) {
      const number = Number(value) || 0;
      return number.toLocaleString("zh-CN");
    }

    function escapeHTML(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function roundMoney(value) {
      return Math.round((Number(value) || 0) * 100) / 100;
    }

    function compactMoney(value) {
      const number = Number(value) || 0;
      if (Math.abs(number) >= 10000) return `${(number / 10000).toFixed(1)}万`;
      return money(Math.round(number));
    }

    function wan(value) {
      return `${((Number(value) || 0) / 10000).toFixed(1)}万`;
    }

    function wan2(value) {
      return `${((Number(value) || 0) / 10000).toFixed(2)}万`;
    }

    function rawTarget(value, decimals = 1) {
      const number = Number(value) || 0;
      const fixed = number.toFixed(decimals);
      return fixed.replace(/\.0+$/, "").replace(/(\.\d*?)0+$/, "$1");
    }

    function pct(actual, target) {
      const a = Number(actual) || 0;
      const t = Number(target) || 0;
      if (!t) return "0%";
      return `${Math.round((a / t) * 100)}%`;
    }

    function moduleCount(key) {
      if (key === "stores") return data.stores.length;
      if (key === "opening") return openingProjects().length;
      return data.stores.filter(store => hasModuleData(store, key)).length;
    }

    function hasModuleData(store, key) {
      if (key === "targets") return Number(store.target?.yearProfit) > 0;
      if (key === "engineering") return Number(store.engineering?.totalInvestment) > 0 || Number(store.engineering?.decorationCost) > 0;
      if (key === "pnl") return Boolean(store.newStorePnl) || Number(store.pnl?.openingCost) > 0 || Number(store.pnl?.netProfit) !== 0 || Number(store.target?.yearRevenue) > 0;
      if (key === "traffic") return Number(store.traffic?.totalVisitors) > 0;
      if (key === "opening") return Number(store.opening?.progress) > 0;
      if (key === "acceptance") return Number(store.acceptance?.productScore) > 0;
      return true;
    }

    function render() {
      if (!modules.some(item => item.id === data.activeModule)) data.activeModule = modules[0].id;
      if (!data.selectedStoreId && data.stores[0]) data.selectedStoreId = data.stores[0].id;
      renderNav();
      renderSummary();
      renderBrandFilter();
      renderRows();
      renderPanel();
      renderSide();
    }

    function renderNav() {
      els.moduleNav.innerHTML = modules.map(item => `
        <button class="nav-btn ${data.activeModule === item.id ? "active" : ""}" data-module="${item.id}">
          <strong>${item.name}</strong>
          <span>${moduleCount(item.countKey)}</span>
        </button>
      `).join("");

      els.moduleNav.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          data.activeModule = btn.dataset.module;
	          if (data.activeModule === "newStorePnl") {
	            data.pnlStoreId ||= "all";
	            data.pnlCategory = "area";
	            data.pnlBrand ||= "all";
	          }
          saveData();
          render();
        });
      });
    }

    function renderBrandFilter() {
      const brands = data.feishuTargets?.brands || [];
      if (!brands.length) {
        els.brandFilter.innerHTML = "";
        return;
      }

      const buttons = [
        { id: "all", name: "全部品牌", count: data.stores.filter(store => !store.name.includes("汇总")).length },
        ...brands.map(brand => ({ id: brand.id, name: brand.name, count: brand.summary?.storeCount || brand.records?.length || 0 }))
      ];

      els.brandFilter.innerHTML = buttons.map(brand => `
        <button class="tab ${data.activeBrand === brand.id || (!data.activeBrand && brand.id === "all") ? "active" : ""}" data-brand="${brand.id}">
          ${brand.name} ${brand.count}
        </button>
      `).join("");

      els.brandFilter.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          data.activeBrand = button.dataset.brand;
          data.selectedStoreId = visibleStores()[0]?.id || data.stores[0]?.id || "";
          saveData();
          render();
        });
      });
    }

    function renderSummary() {
      const scopedStores = visibleStores();
      const targetStores = scopedStores.filter(store => !store.name.includes("汇总"));
      const total = targetStores.length;
      const opening = scopedStores.filter(store => ["筹备中", "试营业"].includes(store.status)).length;
      const target = targetStores.reduce((sum, store) => sum + Number(store.target?.yearProfit || store.targetProfit || 0), 0);
      const actual = scopedStores.reduce((sum, store) => sum + Number(store.actualProfit || 0), 0);
      const traffic = scopedStores.reduce((sum, store) => sum + Number(store.traffic?.totalVisitors || 0), 0);
      const risk = scopedStores.filter(store => ["需老板决策", "需财务复核", "需运营支援"].includes(store.followStatus)).length;

      const metrics = [
        ["门店数", `${total} 家`],
        ["筹备/试营业", `${opening} 家`],
        ["全年目标利润", `¥${money(Math.round(target))}`],
        ["月实际利润", `¥${money(actual)}`],
        ["累计客流", `${money(traffic)} 人`],
        ["需跟进", `${risk} 项`]
      ];

      els.summaryRow.innerHTML = metrics.map(([label, value]) => `
        <div class="metric"><span>${label}</span><strong>${value}</strong></div>
      `).join("");
    }

    function renderRows() {
      const rows = visibleStores();
      if (!rows.length) {
        els.storeRows.innerHTML = `<tr><td colspan="10" class="empty">暂无门店，点击右上角“新增门店”。</td></tr>`;
        return;
      }

      els.storeRows.innerHTML = rows.map(store => {
        const statusClass = store.status === "营业中" ? "ok" : store.status === "需支援" ? "warn" : "blue";
        const followClass = store.followStatus === "正常" ? "ok" : store.followStatus === "已淘汰" ? "" : "warn";
        const displayTarget = store.feishuTarget ? store.target?.yearProfit : store.targetProfit;
        const displayActual = store.feishuTarget ? store.target?.yearRevenue : store.actualProfit;
        return `
          <tr class="${store.id === data.selectedStoreId ? "active-row" : ""}" data-id="${store.id}">
            <td>${store.id}</td>
            <td><strong>${store.name}</strong></td>
            <td>${store.city || "-"}</td>
            <td><span class="status ${statusClass}">${store.status || "-"}</span></td>
            <td>${store.openDate || "-"}</td>
            <td>${store.manager || "-"}</td>
            <td>¥${money(Math.round(displayTarget || 0))}</td>
            <td>¥${money(Math.round(displayActual || 0))}</td>
            <td>${store.feishuTarget ? store.storeType || "-" : pct(store.actualProfit, store.targetProfit)}</td>
            <td><span class="status ${followClass}">${store.followStatus || "-"}</span></td>
          </tr>
        `;
      }).join("");

      els.storeRows.querySelectorAll("tr[data-id]").forEach(row => {
        row.addEventListener("click", () => {
          data.selectedStoreId = row.dataset.id;
          saveData();
          render();
        });
      });
    }

    function renderPanel() {
      const mod = modules.find(item => item.id === data.activeModule) || modules[0];
      data.activeModule = mod.id;
      const store = getStore();
      const isTargetBoard = data.activeModule === "profitTarget" && data.feishuTargets?.records?.length;
      const isPnlBoard = data.activeModule === "newStorePnl";
      const isOpeningBoard = data.activeModule === "opening";
      document.body.classList.toggle("target-board-active", Boolean(isTargetBoard || isPnlBoard || isOpeningBoard));
      els.workspace.classList.toggle("dashboard-mode", Boolean(isTargetBoard || isPnlBoard || isOpeningBoard));
      els.storeTableWrap.style.display = (isTargetBoard || isPnlBoard || isOpeningBoard) ? "none" : "";
      els.sideStack.style.display = (isTargetBoard || isPnlBoard || isOpeningBoard) ? "none" : "";
      els.pageTitle.textContent = mod.name;
      els.pageDesc.textContent = mod.desc;
      els.formTitle.textContent = `${store ? store.name : "门店"} · ${mod.name}`;
      els.formHint.textContent = mod.desc;
      const sourceUrl = data.activeModule === "newStorePnl"
        ? ""
        : (isTargetBoard ? data.feishuTargets?.sourceUrl : "");
      if (els.feishuSourceBtn) {
        els.feishuSourceBtn.hidden = !sourceUrl;
        els.feishuSourceBtn.href = sourceUrl || "#";
        els.feishuSourceBtn.textContent = data.activeModule === "newStorePnl" ? "飞书新店投资表" : "飞书数据源";
      }

      if (!store) {
        els.mainPanel.innerHTML = `<div class="empty">请先新增一家门店。</div>`;

      if (data.activeModule === "dashboard") renderStoreForm(store);

      if (data.activeModule === "traffic") renderTrafficForm(store);
      if (data.activeModule === "opening") renderOpeningForm(store);
      if (data.activeModule === "acceptance") renderAcceptanceForm(store);

        <div class="field ${extra}">
          <label>${label}</label>
          <input name="${name}" type="${type}" value="${value ?? ""}">
        </div>
      `;
    }

        <div class="field">

          <select name="${name}">
            ${options.map(option => `<option ${option === value ? "selected" : ""}>${option}</option>`).join("")}

          <textarea name="${name}">${value ?? ""}</textarea>
        </div>

    function renderTargetDashboard() {
      const source = data.feishuTargets || {};
      const months = source.brands?.[0]?.months || ["01","02","03","04","05","06","07","08","09","10","11","12"];
      const year = targetDataYear(source);
      const categories = [
        ["目标", "targetRevenue"],
        ["房租", "rent"],
        ["人员底薪", "baseSalary"],
        ["主题摊销", "themeAmortization"],
        ["其他", "otherCost"],
        ["固定成本", "fixedCost"],
        ["毛利率", "grossMarginRate"],
        ["可变动成本", "variableCost"],
        ["Z值", "zValue"],
        ["利润", "profit"]
      ];
      const firstDate = `${year}-01-01`;
      const lastDate = `${year}-12-31`;
      data.targetStartDate ||= data.targetStartMonth ? monthStartDate(year, data.targetStartMonth) : firstDate;
      data.targetEndDate ||= data.targetEndMonth ? monthEndDate(year, data.targetEndMonth) : lastDate;
      if (!data.targetStartDate || data.targetStartDate < firstDate || data.targetStartDate > lastDate) data.targetStartDate = firstDate;
      if (!data.targetEndDate || data.targetEndDate < firstDate || data.targetEndDate > lastDate) data.targetEndDate = lastDate;
      if (data.targetStartDate > data.targetEndDate) {
        [data.targetStartDate, data.targetEndDate] = [data.targetEndDate, data.targetStartDate];
      }
      data.targetStoreIds = Array.isArray(data.targetStoreIds)
        ? data.targetStoreIds
        : (data.targetStoreId && data.targetStoreId !== "all" ? [data.targetStoreId] : []);
      data.targetCategories = Array.isArray(data.targetCategories)
        ? data.targetCategories
        : (data.targetCategory && data.targetCategory !== "all" ? [data.targetCategory] : []);

      data.targetOverviewBrand ||= "all";
      const allStores = data.stores.filter(store => store.feishuTarget && !store.name.includes("汇总"));
      const overviewBrand = data.targetOverviewBrand || "all";
      const overviewBrandStores = overviewBrand === "all"
        ? allStores
        : allStores.filter(store => store.brandId === overviewBrand);
      const overviewStoreIds = data.targetStoreIds.filter(id => overviewBrandStores.some(store => store.id === id));
      const overviewStores = overviewStoreIds.length
        ? overviewBrandStores.filter(store => overviewStoreIds.includes(store.id))
        : overviewBrandStores;
      const brandScopedStores = visibleStores().filter(store => store.feishuTarget && !store.name.includes("汇总"));
      const brandScopedIds = new Set(brandScopedStores.map(store => store.id));
      data.targetStoreIds = data.targetStoreIds.filter(id => brandScopedIds.has(id));
      const scopedStores = data.targetStoreIds.length
        ? brandScopedStores.filter(store => data.targetStoreIds.includes(store.id))
        : brandScopedStores;
      const activeBrandName = data.activeBrand === "all" ? "全部品类" : (source.brands?.find(brand => brand.id === data.activeBrand)?.name || "当前品牌");
      const overviewBrandName = overviewBrand === "all" ? "全部品类" : (source.brands?.find(brand => brand.id === overviewBrand)?.name || "当前品类");
      const activeStoreName = overviewStoreIds.length
        ? (overviewStores.length === 1 ? overviewStores[0]?.name : `已选 ${overviewStores.length} 家门店`)
        : "全部门店";
      const tableStoreName = data.targetStoreIds.length
        ? (scopedStores.length === 1 ? scopedStores[0]?.name : `已选 ${scopedStores.length} 家门店`)
        : "全部门店";
      const periodLabel = data.targetStartDate === firstDate && data.targetEndDate === lastDate
        ? "全年"
        : `${formatDateLabel(data.targetStartDate)}-${formatDateLabel(data.targetEndDate)}`;
      const today = new Date();
      const currentMonth = String(today.getFullYear()) === String(year) ? today.getMonth() + 1 : 7;
      const prevMonth = Math.max(1, currentMonth - 1);
      const nextMonth = Math.min(12, currentMonth + 1);
      const quickRanges = [
        ["全年", firstDate, lastDate],
        ["上月", monthStartDate(year, prevMonth), monthEndDate(year, prevMonth)],
        ["本月", monthStartDate(year, currentMonth), monthEndDate(year, currentMonth)],
        ["下月", monthStartDate(year, nextMonth), monthEndDate(year, nextMonth)]
      ];
      const quickButtons = quickRanges.map(([label, start, end]) => `
        <button class="quick-btn ${data.targetStartDate === start && data.targetEndDate === end ? "active" : ""}" type="button" data-start="${start}" data-end="${end}">${label}</button>
      `).join("");
      const titleScope = `${overviewBrandName} / ${activeStoreName}`;
      const tableTitleScope = `${activeBrandName}/门店关键指标`;
      const monthWeights = buildMonthWeights(year, months, data.targetStartDate, data.targetEndDate);
      const totals = sumRecords(overviewStores.map(store => store.feishuTarget), monthWeights);
      const fixedCost = sumMetric(overviewStores, monthWeights, "fixedCost");
      const variableCost = sumMetric(overviewStores, monthWeights, "variableCost");
      const margin = totals.targetRevenue ? totals.profit / totals.targetRevenue : 0;

      const activeStoreCount = countActiveStores(overviewStores, monthWeights);

    function targetDataYear(source) {
      const text = `${source.sourceName || ""} ${source.sourceFile || ""} ${(source.brands || []).map(brand => brand.sheetName || "").join(" ")}`;

    function monthStartDate(year, month) {
      return `${year}-${String(month).padStart(2, "0")}-01`;
    }

    function monthEndDate(year, month) {
      const monthNumber = Number(month);
      const day = new Date(Number(year), monthNumber, 0).getDate();
      return `${year}-${String(monthNumber).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function formatDateLabel(value) {
      const [, month, day] = String(value || "").split("-");
      if (!month || !day) return value || "-";
      return `${Number(month)}月${Number(day)}日`;
    }

    function buildMonthWeights(year, months, startDate, endDate) {
      const start = new Date(`${startDate}T00:00:00`);
      const end = new Date(`${endDate}T00:00:00`);
      return months.map(month => {
        const monthNumber = Number(month);
        const monthStart = new Date(Number(year), monthNumber - 1, 1);
        const monthEnd = new Date(Number(year), monthNumber, 0);
        const rangeStart = start > monthStart ? start : monthStart;
        const rangeEnd = end < monthEnd ? end : monthEnd;
        if (rangeEnd < rangeStart) return { month, weight: 0 };
        const days = Math.round((rangeEnd - rangeStart) / 86400000) + 1;
        const monthDays = monthEnd.getDate();
        return { month, weight: days / monthDays };
      }).filter(item => item.weight > 0);
    }

    function multiCheckbox(name, allLabel, options, selectedValues) {
      const selected = new Set(selectedValues || []);
      const isAllSelected = name === "category" && options.length > 0 && options.every(([, value]) => selected.has(value));
      const searchPlaceholder = name === "store" ? "搜索门店 / 城市 / 商场" : "搜索任意类目";
      const items = [
        `<div class="multi-hint">可连续勾选多个，完成后点底部“应用筛选”。</div>`,
        `<div class="multi-search"><input type="search" data-multi-search placeholder="${searchPlaceholder}"></div>`,
        `<label class="multi-option is-all"><input type="checkbox" name="${name}" value="all" ${name === "category" ? (isAllSelected ? "checked" : "") : (selected.size ? "" : "checked")}>${allLabel}</label>`,
        ...options.map(([label, value]) => `<label class="multi-option"><input type="checkbox" name="${name}" value="${value}" ${selected.has(value) ? "checked" : ""}>${label}</label>`),
        `<div class="multi-actions"><button type="button" data-action="selectAll">全选</button><button type="button" data-action="clear">清空</button><button type="button" data-action="apply">应用筛选</button></div>`
      ];
      return items.join("");
    }

    function weightedMonthlyValue(record, item, key) {
      return Number(record?.monthly?.[item.month]?.[key] || 0) * Number(item.weight || 0);
    }

    function sumRecords(records, monthWeights) {
      const summary = { targetRevenue: 0, profit: 0, monthlyTarget: [], monthlyProfit: [] };
      monthWeights.forEach(item => {
        const target = records.reduce((sum, record) => sum + weightedMonthlyValue(record, item, "targetRevenue"), 0);
        const profit = records.reduce((sum, record) => sum + weightedMonthlyValue(record, item, "profit"), 0);
        summary.monthlyTarget.push(target);
        summary.monthlyProfit.push(profit);
      });
      summary.targetRevenue = summary.monthlyTarget.reduce((sum, value) => sum + value, 0);
      summary.profit = summary.monthlyProfit.reduce((sum, value) => sum + value, 0);
      return summary;
    }

    function sumMetric(stores, monthWeights, key) {
      return stores.reduce((sum, store) => {
        const record = store.feishuTarget;
        if (!record) return sum;
        return sum + monthWeights.reduce((monthSum, item) => monthSum + weightedMonthlyValue(record, item, key), 0);
      }, 0);
    }

    function zValueForStore(store, monthWeights) {
      const record = store?.feishuTarget || {};
      const activeMonths = monthWeights.filter(item => Number(item.weight || 0) > 0);
      if (activeMonths.length === 1) return Number(record.monthly?.[activeMonths[0].month]?.zValue || 0);
      return Number(record.total?.zValue || 0);
    }

    function zValueForStores(stores, monthWeights) {
      return stores.reduce((sum, store) => sum + zValueForStore(store, monthWeights), 0);
    }

      return stores.filter(store => monthWeights.some(item => weightedMonthlyValue(store.feishuTarget, item, "targetRevenue") > 0)).length;
    }
